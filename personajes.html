<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Personajes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:        #c9a84c;
            --gold-light:  #e8cc7a;
            --gold-dark:   #8a6820;
            --ink:         #0d0b07;
            --parchment:   #1a1508;
            --mist:        #2a2010;
            --text:        #d4c49a;
            --text-dim:    #8a7a55;
            --danger:      #c0392b;
            --danger-hover:#e74c3c;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background-color: var(--ink);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(58,122,173,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,11,7,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 60px;
        }
        .logo-text {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-decoration: none;
            text-shadow: 0 0 20px rgba(201,168,76,0.4);
            transition: text-shadow 0.3s;
        }
        .logo-text:hover { text-shadow: 0 0 30px rgba(201,168,76,0.7); }
        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
        .login-icon {
            color: var(--text-dim);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .login-icon:hover { color: var(--gold); }
        .btn-logout {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            background: none;
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--text-dim);
            padding: 0.35rem 0.8rem;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger-hover); }

        /* ── LAYOUT ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .page-title { display: flex; align-items: center; gap: 0.8rem; }
        .page-icon { font-size: 2rem; }
        .page-title h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.15em;
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
        }
        .btn-add {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.4);
            color: var(--gold-light);
            padding: 0.5rem 1.2rem;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-add:hover {
            background: rgba(201,168,76,0.22);
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(201,168,76,0.2);
        }

        /* ── LOADING / EMPTY ── */
        .loading, .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--text-dim);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            margin-left: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.3; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.2); }
        }

        /* ── CARDS GRID ── */
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .item-card {
            background: rgba(26,21,8,0.8);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            animation: fadeUp 0.5s ease both;
        }
        .item-card:hover {
            transform: translateY(-4px);
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 10px 32px rgba(0,0,0,0.45), 0 0 18px rgba(201,168,76,0.06);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Galería de imágenes */
        .card-gallery {
            position: relative;
            height: 200px;
            overflow: hidden;
        }
        .card-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.85) sepia(0.1);
            transition: filter 0.3s, transform 0.4s;
        }
        .item-card:hover .card-gallery img { filter: brightness(0.95); transform: scale(1.03); }

        .gallery-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--parchment), var(--mist));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: rgba(201,168,76,0.2);
        }

        /* Miniaturas */
        .gallery-thumbs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(0,0,0,0.3);
        }
        .gallery-thumbs img {
            width: 44px;
            height: 36px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.6;
            border: 1px solid transparent;
            border-radius: 1px;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .gallery-thumbs img.active,
        .gallery-thumbs img:hover { opacity: 1; border-color: var(--gold); }

        /* Cuerpo */
        .item-body { padding: 1.3rem 1.3rem 0.8rem; }
        .item-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 0.08em;
            margin-bottom: 0.2rem;
        }
        .item-alias {
            font-style: italic;
            font-size: 0.88rem;
            color: var(--text-dim);
            margin-bottom: 0.8rem;
        }

        .item-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
        .tag {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            padding: 0.2rem 0.6rem;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 20px;
            color: var(--gold);
            background: rgba(201,168,76,0.07);
        }

        .item-section { margin-bottom: 0.65rem; }
        .item-section-label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }
        .item-section p {
            font-size: 0.93rem;
            color: var(--text);
            line-height: 1.55;
        }

        /* Admin actions */
        .item-actions {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1.3rem 1rem;
            border-top: 1px solid rgba(201,168,76,0.1);
        }
        .btn-edit, .btn-delete {
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            border: none;
            padding: 0.35rem 0.9rem;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-edit {
            background: rgba(201,168,76,0.12);
            color: var(--gold-light);
            border: 1px solid rgba(201,168,76,0.3);
        }
        .btn-edit:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
        .btn-delete {
            background: rgba(192,57,43,0.1);
            color: #e07070;
            border: 1px solid rgba(192,57,43,0.3);
        }
        .btn-delete:hover { background: rgba(192,57,43,0.25); border-color: var(--danger-hover); }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(5,4,2,0.88);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--parchment);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 2px;
            width: 100%;
            max-width: 560px;
            max-height: 92vh;
            overflow-y: auto;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.3rem 1.5rem;
            border-bottom: 1px solid rgba(201,168,76,0.2);
            position: sticky;
            top: 0;
            background: var(--parchment);
            z-index: 1;
        }
        .modal-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 0.1em;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--gold); }

        /* ── FORM ── */
        .modal-form {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .form-group input[type="text"],
        .form-group textarea {
            background: rgba(13,11,7,0.7);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 2px;
            color: var(--text);
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            padding: 0.6rem 0.85rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: rgba(201,168,76,0.6);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
        }
        .form-group input[type="file"] {
            background: rgba(13,11,7,0.5);
            border: 1px dashed rgba(201,168,76,0.25);
            border-radius: 2px;
            color: var(--text-dim);
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            padding: 0.55rem 0.85rem;
            width: 100%;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input[type="file"]:hover { border-color: rgba(201,168,76,0.5); }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .image-preview img {
            height: 70px;
            width: 90px;
            object-fit: cover;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 2px;
        }
        .btn-primary {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.5);
            color: var(--gold-light);
            padding: 0.75rem 1.5rem;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.25s;
            align-self: flex-end;
        }
        .btn-primary:hover {
            background: rgba(201,168,76,0.28);
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(201,168,76,0.2);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 2rem; right: 2rem;
            z-index: 300;
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            padding: 0.75rem 1.3rem;
            border-radius: 2px;
            border-left: 3px solid var(--gold);
            background: rgba(26,21,8,0.97);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--danger-hover); }

        @media (max-width: 500px) {
            .content-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo-text">NAWARU</a>
            </div>
            <div class="nav-actions">
                <button class="btn-logout" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
                <a href="admin.html" class="login-icon" id="loginIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <div class="page-title">
                <span class="page-icon">👥</span>
                <h1>Personajes</h1>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ Agregar</button>
        </header>

        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Personaje</h2>
                <button type="button" class="modal-close" id="closeModal" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre del personaje">
                </div>
                <div class="form-group">
                    <label for="alias">Alias</label>
                    <input type="text" id="alias" placeholder="Apodo o alias">
                </div>
                <div class="form-group">
                    <label for="personalidad">Personalidad</label>
                    <textarea id="personalidad" rows="3" placeholder="Describe la personalidad..."></textarea>
                </div>
                <div class="form-group">
                    <label for="poder">Poder</label>
                    <input type="text" id="poder" placeholder="Poder principal">
                </div>
                <div class="form-group">
                    <label for="habilidades">Habilidades</label>
                    <textarea id="habilidades" rows="3" placeholder="Lista de habilidades..."></textarea>
                </div>
                <div class="form-group">
                    <label for="caracteristicas">Características</label>
                    <textarea id="caracteristicas" rows="3" placeholder="Características físicas y otras..."></textarea>
                </div>
                <div class="form-group">
                    <label for="imagenes">Imágenes (puedes seleccionar varias)</label>
                    <input type="file" id="imagenes" accept="image/*" multiple>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <button type="button" class="btn-primary" id="saveBtn">💾 Guardar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ══════════════════════════════════════════════
        //  CONFIGURACIÓN — reemplaza con tus credenciales
        // ══════════════════════════════════════════════
        const SUPABASE_URL    = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY    = 'TU_ANON_KEY';
        const TABLE_NAME      = 'personajes';   // nombre de tu tabla
        const STORAGE_BUCKET  = 'imagenes';     // nombre de tu bucket

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ── Estado ──
        let isAdmin   = false;
        let editingId = null;
        let newFiles  = [];   // archivos nuevos seleccionados

        // ── Elementos ──
        const logoutBtn      = document.getElementById('logoutBtn');
        const loginIcon      = document.getElementById('loginIcon');
        const addBtn         = document.getElementById('addBtn');
        const loadingEl      = document.getElementById('loading');
        const contentEl      = document.getElementById('content');
        const modal          = document.getElementById('modal');
        const modalTitle     = document.getElementById('modalTitle');
        const closeModalBtn  = document.getElementById('closeModal');
        const saveBtn        = document.getElementById('saveBtn');
        const nombreInput    = document.getElementById('nombre');
        const aliasInput     = document.getElementById('alias');
        const personalidadIn = document.getElementById('personalidad');
        const poderInput     = document.getElementById('poder');
        const habilidadesIn  = document.getElementById('habilidades');
        const caracteristicasIn = document.getElementById('caracteristicas');
        const imagenesInput  = document.getElementById('imagenes');
        const imgPreview     = document.getElementById('imagePreview');
        const toastEl        = document.getElementById('toast');

        // ── Toast ──
        function showToast(msg, type = 'ok') {
            toastEl.textContent = msg;
            toastEl.className = 'toast show' + (type === 'error' ? ' error' : '');
            setTimeout(() => { toastEl.className = 'toast'; }, 3200);
        }

        // ── Auth ──
        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            isAdmin = !!session;
            logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
            loginIcon.style.display = isAdmin ? 'none'         : 'flex';
            addBtn.style.display    = isAdmin ? 'inline-block' : 'none';
        }

        logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            isAdmin = false;
            logoutBtn.style.display = 'none';
            loginIcon.style.display = 'flex';
            addBtn.style.display    = 'none';
            renderItems(await fetchItems());
            showToast('Sesión cerrada');
        });

        // ── Fetch ──
        async function fetchItems() {
            const { data, error } = await sb
                .from(TABLE_NAME)
                .select('*')
                .order('created_at', { ascending: false });
            if (error) { showToast('Error al cargar datos', 'error'); return []; }
            return data || [];
        }

        // ── Render ──
        function renderItems(items) {
            loadingEl.style.display = 'none';
            contentEl.innerHTML = '';

            if (!items.length) {
                contentEl.innerHTML = '<p class="empty-state">Aún no hay personajes registrados.</p>';
                return;
            }

            items.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.animationDelay = `${i * 0.07}s`;

                // Imágenes: se espera un array JSON o string separado por comas en imagen_urls
                let urls = [];
                if (item.imagen_urls) {
                    try { urls = JSON.parse(item.imagen_urls); } catch { urls = [item.imagen_urls]; }
                } else if (item.imagen_url) {
                    urls = [item.imagen_url];
                }

                // Galería
                let galleryHTML = '';
                if (urls.length) {
                    const thumbs = urls.map((u, idx) =>
                        `<img src="${u}" class="${idx === 0 ? 'active' : ''}" data-idx="${idx}" alt="img ${idx+1}">`
                    ).join('');
                    galleryHTML = `
                        <div class="card-gallery">
                            <img id="main-img-${item.id}" src="${urls[0]}" alt="${item.nombre}">
                        </div>
                        ${urls.length > 1 ? `<div class="gallery-thumbs" data-id="${item.id}">${thumbs}</div>` : ''}
                    `;
                } else {
                    galleryHTML = `<div class="gallery-placeholder">👥</div>`;
                }

                // Tags
                let tagsHTML = '';
                if (item.poder) tagsHTML += `<span class="tag">⚡ ${item.poder}</span>`;

                // Secciones opcionales
                const sec = (label, val) => val
                    ? `<div class="item-section">
                            <div class="item-section-label">${label}</div>
                            <p>${val}</p>
                       </div>` : '';

                const actionsHTML = isAdmin ? `
                    <div class="item-actions">
                        <button class="btn-edit"   data-id="${item.id}">✏ Editar</button>
                        <button class="btn-delete" data-id="${item.id}">✕ Eliminar</button>
                    </div>` : '';

                card.innerHTML = `
                    ${galleryHTML}
                    <div class="item-body">
                        <div class="item-name">${item.nombre || '—'}</div>
                        ${item.alias ? `<div class="item-alias">"${item.alias}"</div>` : ''}
                        ${tagsHTML ? `<div class="item-tags">${tagsHTML}</div>` : ''}
                        ${sec('Personalidad', item.personalidad)}
                        ${sec('Habilidades', item.habilidades)}
                        ${sec('Características', item.caracteristicas)}
                    </div>
                    ${actionsHTML}
                `;
                contentEl.appendChild(card);
            });

            // Galería: cambio de imagen principal al hacer clic en miniaturas
            document.querySelectorAll('.gallery-thumbs').forEach(thumbsEl => {
                thumbsEl.addEventListener('click', e => {
                    const thumb = e.target.closest('img');
                    if (!thumb) return;
                    const id  = thumbsEl.dataset.id;
                    const idx = parseInt(thumb.dataset.idx);
                    const mainImg = document.getElementById(`main-img-${id}`);
                    mainImg.src = thumb.src;
                    thumbsEl.querySelectorAll('img').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                });
            });

            // Admin
            document.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => openEdit(btn.dataset.id, items))
            );
            document.querySelectorAll('.btn-delete').forEach(btn =>
                btn.addEventListener('click', () => deleteItem(btn.dataset.id))
            );
        }

        // ── Modal ──
        function openModal(title) {
            modalTitle.textContent = title;
            modal.classList.add('open');
            nombreInput.focus();
        }

        function closeModalFn() {
            modal.classList.remove('open');
            [nombreInput, aliasInput, poderInput].forEach(el => el.value = '');
            [personalidadIn, habilidadesIn, caracteristicasIn].forEach(el => el.value = '');
            imagenesInput.value = '';
            imgPreview.innerHTML = '';
            editingId = null;
            newFiles  = [];
        }

        addBtn.addEventListener('click', () => { editingId = null; openModal('Agregar Personaje'); });
        closeModalBtn.addEventListener('click', closeModalFn);
        modal.addEventListener('click', e => { if (e.target === modal) closeModalFn(); });

        // Preview múltiple
        imagenesInput.addEventListener('change', () => {
            newFiles = Array.from(imagenesInput.files);
            imgPreview.innerHTML = '';
            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    imgPreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        // ── Open edit ──
        function openEdit(id, items) {
            const item = items.find(r => String(r.id) === String(id));
            if (!item) return;
            editingId = id;
            nombreInput.value       = item.nombre        || '';
            aliasInput.value        = item.alias         || '';
            personalidadIn.value    = item.personalidad  || '';
            poderInput.value        = item.poder         || '';
            habilidadesIn.value     = item.habilidades   || '';
            caracteristicasIn.value = item.caracteristicas || '';

            // Mostrar imágenes existentes
            imgPreview.innerHTML = '';
            let urls = [];
            if (item.imagen_urls) {
                try { urls = JSON.parse(item.imagen_urls); } catch { urls = [item.imagen_urls]; }
            } else if (item.imagen_url) { urls = [item.imagen_url]; }
            urls.forEach(u => {
                const img = document.createElement('img');
                img.src = u;
                imgPreview.appendChild(img);
            });

            openModal('Editar Personaje');
        }

        // ── Save ──
        saveBtn.addEventListener('click', async () => {
            const nombre = nombreInput.value.trim();
            if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

            saveBtn.textContent = '⏳ Guardando...';
            saveBtn.disabled    = true;

            // Subir imágenes nuevas
            const uploadedUrls = [];
            for (const file of newFiles) {
                const ext  = file.name.split('.').pop();
                const path = `personajes/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
                const { error: upErr } = await sb.storage
                    .from(STORAGE_BUCKET)
                    .upload(path, file, { upsert: true });
                if (!upErr) {
                    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
                    uploadedUrls.push(urlData.publicUrl);
                }
            }

            const payload = {
                nombre,
                alias:          aliasInput.value.trim(),
                personalidad:   personalidadIn.value.trim(),
                poder:          poderInput.value.trim(),
                habilidades:    habilidadesIn.value.trim(),
                caracteristicas: caracteristicasIn.value.trim(),
            };
            if (uploadedUrls.length) payload.imagen_urls = JSON.stringify(uploadedUrls);

            let error;
            if (editingId) {
                ({ error } = await sb.from(TABLE_NAME).update(payload).eq('id', editingId));
            } else {
                ({ error } = await sb.from(TABLE_NAME).insert([payload]));
            }

            saveBtn.textContent = '💾 Guardar';
            saveBtn.disabled    = false;

            if (error) {
                showToast('Error al guardar: ' + error.message, 'error');
            } else {
                showToast(editingId ? 'Personaje actualizado' : 'Personaje agregado');
                closeModalFn();
                renderItems(await fetchItems());
            }
        });

        // ── Delete ──
        async function deleteItem(id) {
            if (!confirm('¿Eliminar este personaje?')) return;
            const { error } = await sb.from(TABLE_NAME).delete().eq('id', id);
            if (error) { showToast('Error al eliminar', 'error'); }
            else        { showToast('Personaje eliminado'); renderItems(await fetchItems()); }
        }

        // ── Init ──
        (async () => {
            await checkAuth();
            renderItems(await fetchItems());
        })();
    </script>
</body>
</html>
