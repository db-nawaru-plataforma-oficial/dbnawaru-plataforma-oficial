<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Personajes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root{
            --green:#00ff88; --cyan:#00ccff; --red:#ff2244;
            --ink:#000000; --dark:#050f0a; --mid:#0a1a10;
            --text:#e8fff4; --dim:#00dd77;
            --danger:#ff2244; --danger-hover:#ff4466;
        }

        html{scroll-behavior:smooth}
        body{font-family:'Crimson Text',Georgia,serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden}

        body::before{
            content:'';position:fixed;inset:0;z-index:0;
            background:
                radial-gradient(1px 1px at 15% 20%,rgba(0,255,136,.5) 0%,transparent 100%),
                radial-gradient(1px 1px at 75% 15%,rgba(0,204,255,.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 90% 70%,rgba(255,34,68,.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 40% 85%,rgba(0,255,136,.3) 0%,transparent 100%),
                radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,255,136,.04) 0%,transparent 60%);
            pointer-events:none;
        }

        /* ── NAVBAR HUD ── */
        .navbar{position:sticky;top:0;z-index:200;height:56px;background:rgba(0,0,0,.94);backdrop-filter:blur(20px)}
        .navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),var(--red),transparent);background-size:300% 100%;animation:scan 4s linear infinite;box-shadow:0 0 8px rgba(0,255,136,.5)}
        .navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.25),transparent)}
        @keyframes scan{0%{background-position:-300% 0}100%{background-position:300% 0}}

        .nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 1.5rem;height:100%}

        .nav-ki{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green);position:relative;flex-shrink:0;box-shadow:0 0 8px var(--green),inset 0 0 6px rgba(0,255,136,.2);animation:kiCycle 6s linear infinite}
        .nav-ki::before{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle,#00ffcc 0%,rgba(0,255,136,.3) 60%,transparent 100%);animation:kiPulse 2s ease-in-out infinite alternate}
        @keyframes kiCycle{0%,100%{border-color:var(--green);box-shadow:0 0 8px var(--green)}33%{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan)}66%{border-color:var(--red);box-shadow:0 0 8px var(--red)}}
        @keyframes kiPulse{from{opacity:.4;transform:scale(.7)}to{opacity:1;transform:scale(1.1)}}

        .nav-logo-wrap{display:flex;align-items:center;gap:.7rem;text-decoration:none}
        .nav-logo-text{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.3em;background:linear-gradient(90deg,var(--green),var(--cyan),var(--red));background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoFlow 5s ease infinite}
        @keyframes logoFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

        .nav-right{display:flex;align-items:center;gap:.6rem}
        .btn-logout{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;background:none;border:1px solid rgba(255,34,68,.25);color:rgba(255,100,120,.6);padding:.28rem .7rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-logout:hover{border-color:var(--red);color:#ff6680;box-shadow:0 0 8px rgba(255,34,68,.2)}
        .nav-admin{display:flex;align-items:center;gap:.35rem;font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;color:var(--dim);text-decoration:none;border:1px solid rgba(0,255,136,.2);padding:.28rem .65rem;border-radius:2px;transition:all .2s;position:relative;overflow:hidden}
        .nav-admin::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.07),transparent);transform:translateX(-100%);transition:transform .4s}
        .nav-admin:hover{border-color:var(--green);color:#00ffcc;box-shadow:0 0 10px rgba(0,255,136,.15)}
        .nav-admin:hover::before{transform:translateX(100%)}

        /* ── MAIN CONTAINER ── */
        .container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 5rem}

        /* ── PAGE HEADER ── */
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1rem;position:relative}
        .page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.4),rgba(0,204,255,.2),transparent)}

        .page-title{display:flex;align-items:center;gap:.9rem}
        .page-icon{font-size:1.8rem;filter:drop-shadow(0 0 10px rgba(0,255,136,.6))}
        .page-title h1{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3vw,1.5rem);font-weight:900;letter-spacing:.2em;background:linear-gradient(90deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .page-meta{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.15em;color:rgba(0,255,136,.3);margin-top:.3rem}

        .btn-add{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.12em;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.35);color:var(--green);padding:.45rem 1rem;border-radius:2px;cursor:pointer;transition:all .25s}
        .btn-add:hover{background:rgba(0,255,136,.16);border-color:var(--green);box-shadow:0 0 15px rgba(0,255,136,.25)}

        /* ── LOADING / EMPTY ── */
        .loading,.empty-state{text-align:center;padding:4rem 1rem;font-style:italic;font-size:1.1rem;color:var(--dim)}
        .loading::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:8px;animation:pulse 1s infinite;box-shadow:0 0 6px var(--green)}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

        /* ══════════════════════════════
           GRID DE PERSONAJES CIRCULAR
        ══════════════════════════════ */
        .content-list{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
            gap:2rem 1.5rem;
        }

        /* Card estilo ficha de personaje */
        .item-card{
            display:flex; flex-direction:column; align-items:center;
            text-align:center;
            cursor:pointer;
            animation:fadeUp .5s ease both;
            position:relative;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        /* ── RETRATO CIRCULAR ── */
        .portrait-wrap{
            position:relative;
            width:150px; height:150px;
            flex-shrink:0; margin-bottom:1rem;
        }

        /* Anillo exterior giratorio */
        .portrait-ring{
            position:absolute; inset:-6px;
            border-radius:50%;
            border:1.5px solid transparent;
            border-top-color:var(--green);
            border-right-color:var(--cyan);
            animation:ringRotate 4s linear infinite;
            opacity:.6;
            transition:opacity .3s;
        }
        .item-card:hover .portrait-ring{opacity:1;border-width:2px}
        @keyframes ringRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

        /* Anillo interior opuesto */
        .portrait-ring-2{
            position:absolute; inset:-3px;
            border-radius:50%;
            border:1px solid transparent;
            border-bottom-color:rgba(0,255,136,.3);
            border-left-color:rgba(255,34,68,.2);
            animation:ringRotate 6s linear infinite reverse;
        }

        /* Imagen circular */
        .portrait-img{
            width:150px; height:150px;
            border-radius:50%;
            object-fit:cover; object-position:top center;
            display:block;
            border:2px solid rgba(0,255,136,.3);
            filter:brightness(.88) saturate(.9);
            transition:filter .3s, border-color .3s, box-shadow .3s;
            cursor:zoom-in;
        }
        .item-card:hover .portrait-img{
            filter:brightness(1) saturate(1.05);
            border-color:var(--green);
            box-shadow:0 0 20px rgba(0,255,136,.4), 0 0 40px rgba(0,204,255,.15);
        }

        /* Placeholder sin imagen */
        .portrait-placeholder{
            width:150px; height:150px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--dark),var(--mid));
            border:2px solid rgba(0,255,136,.2);
            display:flex; align-items:center; justify-content:center;
            font-size:3rem;
            filter:drop-shadow(0 0 8px rgba(0,255,136,.2));
            transition:all .3s;
        }
        .item-card:hover .portrait-placeholder{border-color:var(--green);box-shadow:0 0 20px rgba(0,255,136,.3)}

        /* Indicador de número de imágenes */
        .portrait-count{
            position:absolute; bottom:4px; right:4px;
            width:22px; height:22px; border-radius:50%;
            background:rgba(0,0,0,.85);
            border:1px solid rgba(0,255,136,.4);
            font-family:'Orbitron',sans-serif; font-size:.45rem;
            color:var(--green); display:flex; align-items:center; justify-content:center;
            box-shadow:0 0 6px rgba(0,255,136,.3);
        }

        /* ── INFO CARD ── */
        .card-info{
            width:100%;
            background:rgba(5,15,10,.8);
            border:1px solid rgba(0,255,136,.15);
            border-top:none;
            padding:.9rem 1rem .7rem;
            position:relative;
            transition:border-color .3s, box-shadow .3s;
        }
        .item-card:hover .card-info{border-color:rgba(0,255,136,.4);box-shadow:0 4px 20px rgba(0,0,0,.5)}

        /* Línea superior de la card */
        .card-info::before{
            content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
            background:linear-gradient(90deg,transparent,var(--green),transparent);
            opacity:.5; transition:opacity .3s;
        }
        .item-card:hover .card-info::before{opacity:1}

        .card-name{
            font-family:'Cinzel',serif; font-size:.85rem; font-weight:600;
            color:#00ffcc; letter-spacing:.08em; margin-bottom:.2rem;
            text-shadow:0 0 8px rgba(0,255,204,.3);
            transition:text-shadow .3s;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .item-card:hover .card-name{text-shadow:0 0 12px rgba(0,255,204,.6)}

        .card-alias{
            font-style:italic; font-size:.78rem;
            color:rgba(0,221,119,.6); margin-bottom:.5rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }

        .card-poder{
            display:inline-flex; align-items:center; gap:.3rem;
            font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.1em;
            padding:.15rem .55rem;
            border:1px solid rgba(0,255,136,.3);
            border-radius:20px; color:var(--green);
            background:rgba(0,255,136,.06);
            max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }

        /* Botón ver más */
        .btn-ver-mas{
            margin-top:.7rem; width:100%;
            font-family:'Orbitron',sans-serif; font-size:.55rem; letter-spacing:.12em;
            background:rgba(0,255,136,.06);
            border:1px solid rgba(0,255,136,.2);
            color:rgba(0,255,136,.5);
            padding:.4rem .5rem; border-radius:2px;
            cursor:pointer; transition:all .25s;
            position:relative; overflow:hidden;
        }
        .btn-ver-mas::before{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,transparent,rgba(0,255,136,.08),transparent);
            transform:translateX(-100%);transition:transform .4s;
        }
        .btn-ver-mas:hover{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(0,255,136,.2)}
        .btn-ver-mas:hover::before{transform:translateX(100%)}

        /* Acciones admin */
        .card-actions{
            display:flex; gap:.4rem; margin-top:.5rem; width:100%;
        }
        .btn-edit,.btn-delete{
            flex:1; font-family:'Orbitron',sans-serif; font-size:.5rem; letter-spacing:.08em;
            border:none; padding:.35rem .4rem; border-radius:2px; cursor:pointer; transition:all .2s;
        }
        .btn-edit{background:rgba(0,255,136,.07);color:#00ffcc;border:1px solid rgba(0,255,136,.25)}
        .btn-edit:hover{background:rgba(0,255,136,.18);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.2)}
        .btn-delete{background:rgba(255,34,68,.07);color:#ff6680;border:1px solid rgba(255,34,68,.25)}
        .btn-delete:hover{background:rgba(255,34,68,.18);border-color:var(--danger-hover);box-shadow:0 0 8px rgba(255,34,68,.2)}

        /* ══════════════════════════════
           PANEL DE DETALLE (MODAL ÉPICO)
        ══════════════════════════════ */
        .detail-overlay{
            display:none; position:fixed; inset:0; z-index:300;
            background:rgba(0,0,0,.88); backdrop-filter:blur(10px);
            align-items:center; justify-content:center; padding:1.5rem;
        }
        .detail-overlay.open{display:flex}

        .detail-panel{
            background:rgba(2,10,6,.97);
            border:1px solid rgba(0,255,136,.25);
            border-radius:2px;
            width:100%; max-width:680px; max-height:90vh;
            overflow-y:auto;
            position:relative;
            animation:panelIn .3s cubic-bezier(.16,1,.3,1);
            box-shadow:0 0 60px rgba(0,0,0,.9), 0 0 30px rgba(0,255,136,.06);
        }

        /* Línea superior del panel */
        .detail-panel::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,var(--red),var(--cyan),var(--green));
        }

        @keyframes panelIn{
            from{opacity:0;transform:scale(.93) translateY(20px)}
            to  {opacity:1;transform:scale(1) translateY(0)}
        }

        .detail-header{
            display:flex; align-items:flex-start; gap:1.5rem;
            padding:2rem 2rem 1.5rem;
            border-bottom:1px solid rgba(0,255,136,.1);
            position:relative;
        }

        .detail-portrait-wrap{position:relative;flex-shrink:0}

        .detail-portrait{
            width:110px; height:110px; border-radius:50%;
            object-fit:cover; object-position:top center;
            border:2px solid rgba(0,255,136,.4);
            box-shadow:0 0 20px rgba(0,255,136,.3), 0 0 40px rgba(0,204,255,.1);
            cursor:zoom-in;
        }

        .detail-portrait-placeholder{
            width:110px; height:110px; border-radius:50%;
            background:linear-gradient(135deg,var(--dark),var(--mid));
            border:2px solid rgba(0,255,136,.3);
            display:flex;align-items:center;justify-content:center;font-size:2.5rem;
        }

        .detail-portrait-ring{
            position:absolute;inset:-5px;border-radius:50%;
            border:1.5px solid transparent;
            border-top-color:var(--green);border-right-color:var(--cyan);
            animation:ringRotate 3s linear infinite;
        }

        .detail-title-block{flex:1;min-width:0}

        .detail-name{
            font-family:'Cinzel',serif; font-size:1.4rem; font-weight:600;
            color:#00ffcc; letter-spacing:.1em; margin-bottom:.3rem;
            text-shadow:0 0 15px rgba(0,255,204,.4);
        }

        .detail-alias{
            font-style:italic; font-size:1rem;
            color:rgba(0,221,119,.6); margin-bottom:.8rem;
        }

        .detail-tags{display:flex;flex-wrap:wrap;gap:.4rem}

        .detail-tag{
            font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em;
            padding:.2rem .7rem; border:1px solid rgba(0,255,136,.35);
            border-radius:20px; color:var(--green); background:rgba(0,255,136,.07);
            box-shadow:0 0 6px rgba(0,255,136,.12);
        }

        .detail-close{
            position:absolute; top:1.2rem; right:1.2rem;
            width:30px; height:30px;
            background:rgba(255,34,68,.08); border:1px solid rgba(255,34,68,.25);
            border-radius:2px; color:#ff6680; font-size:1.1rem;
            cursor:pointer; display:flex;align-items:center;justify-content:center;
            transition:all .2s;
        }
        .detail-close:hover{background:rgba(255,34,68,.2);border-color:var(--red)}

        /* Galería de imágenes en el panel */
        .detail-gallery{padding:1rem 2rem;border-bottom:1px solid rgba(0,255,136,.08)}
        .detail-gallery-title{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.15em;color:rgba(0,255,136,.3);margin-bottom:.7rem}
        .detail-thumbs{display:flex;gap:.5rem;flex-wrap:wrap}
        .detail-thumb{
            width:70px; height:70px; border-radius:50%;
            object-fit:cover; cursor:zoom-in;
            border:2px solid rgba(0,255,136,.2);
            transition:all .2s; filter:brightness(.8);
        }
        .detail-thumb.active,.detail-thumb:hover{border-color:var(--green);filter:brightness(1);box-shadow:0 0 10px rgba(0,255,136,.4)}

        /* Secciones del detalle */
        .detail-body{padding:1.5rem 2rem}

        .detail-section{margin-bottom:1.3rem}
        .detail-section:last-child{margin-bottom:0}

        .detail-section-label{
            font-family:'Orbitron',sans-serif; font-size:.55rem; letter-spacing:.18em;
            color:rgba(0,255,136,.35); text-transform:uppercase; margin-bottom:.4rem;
            display:flex; align-items:center; gap:.5rem;
        }
        .detail-section-label::after{
            content:''; flex:1; height:1px;
            background:linear-gradient(90deg,rgba(0,255,136,.2),transparent);
        }

        .detail-section p{
            font-family:'Crimson Text',serif; font-size:1rem;
            color:rgba(200,255,230,.75); line-height:1.7;
        }

        /* ══════════════════════════════
           MODAL FORMULARIO
        ══════════════════════════════ */
        .modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
        .modal.open{display:flex}
        .modal-content{background:var(--dark);border:1px solid rgba(0,255,136,.3);border-radius:2px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:panelIn .25s ease;box-shadow:0 0 30px rgba(0,255,136,.12)}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem;border-bottom:1px solid rgba(0,255,136,.15);position:sticky;top:0;background:var(--dark);z-index:1}
        .modal-header h2{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;color:#00ffcc;letter-spacing:.15em}
        .modal-close{background:none;border:none;color:var(--dim);font-size:1.4rem;cursor:pointer;line-height:1;transition:color .2s,filter .2s}
        .modal-close:hover{color:var(--green);filter:drop-shadow(0 0 4px #00ff88)}
        .modal-form{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
        .form-group{display:flex;flex-direction:column;gap:.35rem}
        .form-group label{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.12em;color:rgba(0,255,136,.4);text-transform:uppercase}
        .form-group input[type="text"],.form-group textarea{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.2);border-radius:2px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:.6rem .85rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
        .form-group input[type="text"]:focus,.form-group textarea:focus{border-color:rgba(0,255,136,.55);box-shadow:0 0 0 3px rgba(0,255,136,.07),0 0 12px rgba(0,255,136,.08)}
        .form-group input[type="file"]{background:rgba(0,0,0,.5);border:1px dashed rgba(0,255,136,.2);border-radius:2px;color:var(--dim);font-family:'Crimson Text',serif;font-size:.9rem;padding:.5rem .85rem;width:100%;cursor:pointer;outline:none;transition:border-color .2s}
        .form-group input[type="file"]:hover{border-color:rgba(0,255,136,.45)}
        .image-preview{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
        .image-preview img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,255,136,.25);box-shadow:0 0 6px rgba(0,255,136,.1)}
        .btn-primary{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:.15em;background:rgba(0,255,136,.09);border:1px solid rgba(0,255,136,.45);color:#00ffcc;padding:.7rem 1.5rem;border-radius:2px;cursor:pointer;transition:all .25s;align-self:flex-end}
        .btn-primary:hover{background:rgba(0,255,136,.2);border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.25)}

        /* ══════════════════════════════
           LIGHTBOX — IMAGEN COMPLETA
        ══════════════════════════════ */
        .lightbox{
            display:none; position:fixed; inset:0; z-index:600;
            background:rgba(0,0,0,.96); backdrop-filter:blur(12px);
            align-items:center; justify-content:center;
            padding:1.5rem; cursor:zoom-out;
        }
        .lightbox.open{ display:flex; }

        .lightbox-inner{
            position:relative;
            max-width:min(800px,94vw);
            max-height:90vh;
            animation:lbIn .25s cubic-bezier(.16,1,.3,1);
        }
        @keyframes lbIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

        .lightbox-img{
            display:block;
            max-width:100%; max-height:85vh;
            object-fit:contain;
            border-radius:4px;
            border:1px solid rgba(0,255,136,.25);
            box-shadow:
                0 0 40px rgba(0,0,0,.9),
                0 0 30px rgba(0,255,136,.12),
                0 0 60px rgba(0,204,255,.06);
        }

        /* Borde superior neón */
        .lightbox-inner::before{
            content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;
            background:linear-gradient(90deg,transparent,var(--green),var(--cyan),transparent);
            box-shadow:0 0 8px rgba(0,255,136,.5);
        }

        .lightbox-close{
            position:absolute; top:-14px; right:-14px;
            width:34px; height:34px;
            background:rgba(255,34,68,.12);
            border:1px solid rgba(255,34,68,.4);
            border-radius:50%; color:#ff6680;
            font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .2s; z-index:1;
            box-shadow:0 0 10px rgba(255,34,68,.2);
        }
        .lightbox-close:hover{
            background:rgba(255,34,68,.3);
            border-color:var(--red);
            box-shadow:0 0 16px rgba(255,34,68,.4);
            transform:scale(1.1);
        }

        /* Navegación de imágenes */
        .lightbox-nav{
            position:absolute; top:50%; transform:translateY(-50%);
            width:36px; height:36px;
            background:rgba(0,0,0,.7);
            border:1px solid rgba(0,255,136,.3);
            border-radius:2px; color:var(--green);
            font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .2s;
            box-shadow:0 0 8px rgba(0,255,136,.1);
        }
        .lightbox-nav:hover{
            background:rgba(0,255,136,.12);
            border-color:var(--green);
            box-shadow:0 0 14px rgba(0,255,136,.3);
        }
        .lightbox-prev{ left:-48px; }
        .lightbox-next{ right:-48px; }

        /* Contador estilo HUD */
        .lightbox-counter{
            position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
            font-family:'Orbitron',sans-serif; font-size:.55rem; letter-spacing:.15em;
            color:rgba(0,255,136,.4);
        }

        /* Info del personaje en lightbox */
        .lightbox-name{
            position:absolute; bottom:-26px; left:0;
            font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.1em;
            color:rgba(0,255,204,.5);
        }

        @media(max-width:600px){
            .lightbox-prev{ left:-36px; }
            .lightbox-next{ right:-36px; }
            .lightbox-nav{ width:28px; height:28px; font-size:.9rem; }
        }

        /* ── TOAST ── */
        .toast{position:fixed;bottom:2rem;right:2rem;z-index:500;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.08em;padding:.7rem 1.2rem;border-radius:2px;border-left:2px solid var(--green);background:rgba(0,8,4,.97);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 12px rgba(0,255,136,.1);opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.error{border-color:var(--danger-hover)}

        @media(max-width:500px){
            .content-list{grid-template-columns:repeat(2,1fr);gap:1.5rem 1rem}
            .portrait-wrap,.portrait-img,.portrait-placeholder{width:120px;height:120px}
            .detail-header{flex-direction:column;align-items:center;text-align:center}
            .detail-body{padding:1.2rem 1.3rem}
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo-wrap">
                <div class="nav-ki"></div>
                <span class="nav-logo-text">NAWARU</span>
            </a>
            <div class="nav-right">
                <button class="btn-logout" id="logoutBtn" style="display:none;">SALIR</button>
                <a href="admin.html" class="nav-admin" id="loginIcon">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    ADMIN
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <div class="page-title">
                <span class="page-icon">👥</span>
                <div>
                    <h1>Personajes</h1>
                    <div class="page-meta">// NAWARU UNIVERSE</div>
                </div>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ AGREGAR</button>
        </div>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Panel de detalle -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header" id="detailHeader">
                <button class="detail-close" id="detailClose">&times;</button>
            </div>
            <div class="detail-gallery" id="detailGallery" style="display:none"></div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <!-- Modal formulario -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">AGREGAR PERSONAJE</h2><button type="button" class="modal-close" id="closeModal">&times;</button></div>
            <div class="modal-form">
                <div class="form-group"><label for="nombre">Nombre</label><input type="text" id="nombre" placeholder="Nombre del personaje"></div>
                <div class="form-group"><label for="alias">Alias</label><input type="text" id="alias" placeholder="Apodo o alias"></div>
                <div class="form-group"><label for="personalidad">Personalidad</label><textarea id="personalidad" rows="3" placeholder="Describe la personalidad..."></textarea></div>
                <div class="form-group"><label for="poder">Poder</label><input type="text" id="poder" placeholder="Poder principal"></div>
                <div class="form-group"><label for="habilidades">Habilidades</label><textarea id="habilidades" rows="3" placeholder="Lista de habilidades..."></textarea></div>
                <div class="form-group"><label for="caracteristicas">Características</label><textarea id="caracteristicas" rows="3" placeholder="Características físicas y otras..."></textarea></div>
                <div class="form-group"><label for="imagenes">Imágenes (varias)</label><input type="file" id="imagenes" accept="image/*" multiple><div id="imagePreview" class="image-preview"></div></div>
                <button type="button" class="btn-primary" id="saveBtn">💾 GUARDAR</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- LIGHTBOX imagen completa -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-inner" id="lightboxInner">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
            <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
            <div class="lightbox-name" id="lightboxName"></div>
            <div class="lightbox-counter" id="lightboxCounter"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL='https://shnwanhkuphlcevxnlvh.supabase.co';
        const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobndhbmhrdXBobGNldnhubHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTk2NTIsImV4cCI6MjA4NzM3NTY1Mn0.sUfY3j1wQS4-rjWAxY5a7m4ADGD2n2tYJSwEW0nfNNQ';
        const TABLE_NAME='personajes', STORAGE_BUCKET='imagenes';

        const {createClient}=supabase, sb=createClient(SUPABASE_URL,SUPABASE_KEY);
        let isAdmin=false, editingId=null, newFiles=[], currentItems=[];

        const logoutBtn=document.getElementById('logoutBtn'),loginIcon=document.getElementById('loginIcon'),addBtn=document.getElementById('addBtn'),loadingEl=document.getElementById('loading'),contentEl=document.getElementById('content'),modal=document.getElementById('modal'),modalTitle=document.getElementById('modalTitle'),closeModalBtn=document.getElementById('closeModal'),saveBtn=document.getElementById('saveBtn'),nombreInput=document.getElementById('nombre'),aliasInput=document.getElementById('alias'),personalidadIn=document.getElementById('personalidad'),poderInput=document.getElementById('poder'),habilidadesIn=document.getElementById('habilidades'),caracteristicasIn=document.getElementById('caracteristicas'),imagenesInput=document.getElementById('imagenes'),imgPreview=document.getElementById('imagePreview'),toastEl=document.getElementById('toast');
        const detailOverlay=document.getElementById('detailOverlay'),detailHeader=document.getElementById('detailHeader'),detailGallery=document.getElementById('detailGallery'),detailBody=document.getElementById('detailBody'),detailClose=document.getElementById('detailClose');

        function showToast(msg,type='ok'){toastEl.textContent=msg;toastEl.className='toast show'+(type==='error'?' error':'');setTimeout(()=>{toastEl.className='toast'},3200)}

        async function checkAuth(){const{data:{session}}=await sb.auth.getSession();isAdmin=!!session;logoutBtn.style.display=isAdmin?'inline-block':'none';loginIcon.style.display=isAdmin?'none':'flex';addBtn.style.display=isAdmin?'inline-block':'none'}

        logoutBtn.addEventListener('click',async()=>{await sb.auth.signOut();isAdmin=false;logoutBtn.style.display='none';loginIcon.style.display='flex';addBtn.style.display='none';renderItems(await fetchItems());showToast('Sesión cerrada')});

        async function fetchItems(){const{data,error}=await sb.from(TABLE_NAME).select('*').order('created_at',{ascending:false});if(error){showToast('Error al cargar','error');return[]}return data||[]}

        function getUrls(item){
            let urls=[];
            if(item.imagen_urls){try{urls=JSON.parse(item.imagen_urls)}catch{urls=[item.imagen_urls]}}
            else if(item.imagen_url){urls=[item.imagen_url]}
            return urls;
        }

        /* ── RENDER CARDS CIRCULARES ── */
        function renderItems(items){
            currentItems=items;
            loadingEl.style.display='none';
            contentEl.innerHTML='';
            if(!items.length){contentEl.innerHTML='<p class="empty-state">Aún no hay personajes registrados.</p>';return}

            items.forEach((item,i)=>{
                const card=document.createElement('div');
                card.className='item-card';
                card.style.animationDelay=`${i*.06}s`;

                const urls=getUrls(item);
                const mainUrl=urls[0]||null;

                // Retrato
                const portraitHTML=mainUrl
                    ?`<img src="${mainUrl}" alt="${item.nombre}" class="portrait-img" loading="lazy">`
                    :`<div class="portrait-placeholder">👥</div>`;

                const countHTML=urls.length>1?`<div class="portrait-count">${urls.length}</div>`:'';

                // Power tag
                const poderHTML=item.poder
                   ?`<div class="card-poder">${item.poder}</div>`:'';

                // Acciones admin
                const actionsHTML=isAdmin?`<div class="card-actions"><button class="btn-edit" data-id="${item.id}">✏ EDITAR</button><button class="btn-delete" data-id="${item.id}">✕</button></div>`:'';

                card.innerHTML=`
                    <div class="portrait-wrap">
                        <div class="portrait-ring"></div>
                        <div class="portrait-ring-2"></div>
                        ${portraitHTML}
                        ${countHTML}
                    </div>
                    <div class="card-info">
                        <div class="card-name">${item.nombre||'—'}</div>
                        ${item.alias?`<div class="card-alias">"${item.alias}"</div>`:''}
                        ${poderHTML}
                        <button class="btn-ver-mas" data-id="${item.id}">→ VER PERSONAJE</button>
                        ${actionsHTML}
                    </div>
                `;
                contentEl.appendChild(card);
            });

            // Eventos
            document.querySelectorAll('.btn-ver-mas').forEach(btn=>
                btn.addEventListener('click',()=>openDetail(btn.dataset.id))
            );
            document.querySelectorAll('.btn-edit').forEach(btn=>
                btn.addEventListener('click',e=>{e.stopPropagation();openEdit(btn.dataset.id)})
            );
            document.querySelectorAll('.btn-delete').forEach(btn=>
                btn.addEventListener('click',e=>{e.stopPropagation();deleteItem(btn.dataset.id)})
            );
        }

        /* ── PANEL DETALLE ── */
        function openDetail(id){
            const item=currentItems.find(r=>String(r.id)===String(id));
            if(!item)return;

            const urls=getUrls(item);
            const mainUrl=urls[0]||null;

            // Header
            const portraitHTML=mainUrl
                ?`<img src="${mainUrl}" alt="${item.nombre}" class="detail-portrait" id="detailMainImg">`
                :`<div class="detail-portrait-placeholder">👥</div>`;

            const tagsHTML=[
                item.poder?`<span class="detail-tag"> ${item.poder}</span>`:'',
            ].filter(Boolean).join('');

            detailHeader.innerHTML=`
                <button class="detail-close" id="detailClose">&times;</button>
                <div class="detail-portrait-wrap">
                    <div class="detail-portrait-ring"></div>
                    ${portraitHTML}
                </div>
                <div class="detail-title-block">
                    <div class="detail-name">${item.nombre||'—'}</div>
                    ${item.alias?`<div class="detail-alias">"${item.alias}"</div>`:''}
                    <div class="detail-tags">${tagsHTML}</div>
                </div>
            `;

            // Galería de miniaturas
            if(urls.length>1){
                detailGallery.style.display='block';
                const thumbsHTML=urls.map((u,idx)=>
                    `<img src="${u}" class="detail-thumb ${idx===0?'active':''}" data-idx="${idx}" alt="img ${idx+1}">`
                ).join('');
                detailGallery.innerHTML=`<div class="detail-gallery-title">// GALERÍA</div><div class="detail-thumbs">${thumbsHTML}</div>`;

                detailGallery.querySelectorAll('.detail-thumb').forEach(t=>{
                    t.addEventListener('click',()=>{
                        const mainImg=document.getElementById('detailMainImg');
                        if(mainImg)mainImg.src=t.src;
                        detailGallery.querySelectorAll('.detail-thumb').forEach(x=>x.classList.remove('active'));
                        t.classList.add('active');
                    });
                });
            } else {
                detailGallery.style.display='none';
            }

            // Cuerpo del detalle
            const sec=(label,val)=>val?`
                <div class="detail-section">
                    <div class="detail-section-label">${label}</div>
                    <p>${val}</p>
                </div>`:'';

            detailBody.innerHTML=`
                ${sec('Personalidad', item.personalidad)}
                ${sec('Habilidades', item.habilidades)}
                ${sec('Características', item.caracteristicas)}
                ${!item.personalidad&&!item.habilidades&&!item.caracteristicas?'<p style="font-style:italic;color:rgba(0,221,119,.4);text-align:center">Sin información detallada aún.</p>':''}
            `;

            // Cerrar
            document.getElementById('detailClose').addEventListener('click',closeDetail);
            detailOverlay.classList.add('open');
            document.body.style.overflow='hidden';
        }

        function closeDetail(){
            detailOverlay.classList.remove('open');
            document.body.style.overflow='';
        }

        detailOverlay.addEventListener('click',e=>{if(e.target===detailOverlay)closeDetail()});
        document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

        /* ── MODAL FORM ── */
        function openModal(title){modalTitle.textContent=title;modal.classList.add('open');nombreInput.focus()}
        function closeModalFn(){modal.classList.remove('open');[nombreInput,aliasInput,poderInput].forEach(el=>el.value='');[personalidadIn,habilidadesIn,caracteristicasIn].forEach(el=>el.value='');imagenesInput.value='';imgPreview.innerHTML='';editingId=null;newFiles=[]}

        addBtn.addEventListener('click',()=>{editingId=null;openModal('AGREGAR PERSONAJE')});
        closeModalBtn.addEventListener('click',closeModalFn);
        modal.addEventListener('click',e=>{if(e.target===modal)closeModalFn()});

        imagenesInput.addEventListener('change',()=>{
            newFiles=Array.from(imagenesInput.files);imgPreview.innerHTML='';
            newFiles.forEach(file=>{const reader=new FileReader();reader.onload=e=>{const img=document.createElement('img');img.src=e.target.result;imgPreview.appendChild(img)};reader.readAsDataURL(file)})
        });

        function openEdit(id){
            const item=currentItems.find(r=>String(r.id)===String(id));
            if(!item)return;
            editingId=id;
            nombreInput.value=item.nombre||'';aliasInput.value=item.alias||'';personalidadIn.value=item.personalidad||'';poderInput.value=item.poder||'';habilidadesIn.value=item.habilidades||'';caracteristicasIn.value=item.caracteristicas||'';
            imgPreview.innerHTML='';
            getUrls(item).forEach(u=>{const img=document.createElement('img');img.src=u;imgPreview.appendChild(img)});
            openModal('EDITAR PERSONAJE');
        }

        saveBtn.addEventListener('click',async()=>{
            const nombre=nombreInput.value.trim();
            if(!nombre){showToast('El nombre es obligatorio','error');return}
            saveBtn.textContent='⏳ GUARDANDO...';saveBtn.disabled=true;
            const uploadedUrls=[];
            for(const file of newFiles){
                const ext=file.name.split('.').pop();
                const path=`personajes/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
                const{error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:true});
                if(!upErr){const{data:urlData}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);uploadedUrls.push(urlData.publicUrl)}
            }
            const payload={nombre,alias:aliasInput.value.trim(),personalidad:personalidadIn.value.trim(),poder:poderInput.value.trim(),habilidades:habilidadesIn.value.trim(),caracteristicas:caracteristicasIn.value.trim()};
            if(uploadedUrls.length)payload.imagen_urls=JSON.stringify(uploadedUrls);
            let error;
            if(editingId){({error}=await sb.from(TABLE_NAME).update(payload).eq('id',editingId))}
            else{({error}=await sb.from(TABLE_NAME).insert([payload]))}
            saveBtn.textContent='💾 GUARDAR';saveBtn.disabled=false;
            if(error){showToast('Error: '+error.message,'error')}
            else{showToast(editingId?'Personaje actualizado':'Personaje agregado');closeModalFn();renderItems(await fetchItems())}
        });

        async function deleteItem(id){
            if(!confirm('¿Eliminar este personaje?'))return;
            const{error}=await sb.from(TABLE_NAME).delete().eq('id',id);
            if(error){showToast('Error al eliminar','error')}
            else{showToast('Personaje eliminado');renderItems(await fetchItems())}
        }

        (async()=>{await checkAuth();renderItems(await fetchItems())})();

        /* ══════════════════════════════
           LIGHTBOX — IMAGEN COMPLETA
        ══════════════════════════════ */
        const lightbox      = document.getElementById('lightbox');
        const lightboxImg   = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev  = document.getElementById('lightboxPrev');
        const lightboxNext  = document.getElementById('lightboxNext');
        const lightboxCounter = document.getElementById('lightboxCounter');
        const lightboxName  = document.getElementById('lightboxName');

        let lbUrls = [], lbIdx = 0, lbPersonajeName = '';

        function openLightbox(urls, idx, nombre) {
            lbUrls = urls;
            lbIdx  = idx;
            lbPersonajeName = nombre || '';
            updateLightbox();
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox() {
            lightboxImg.src = lbUrls[lbIdx];
            lightboxImg.alt = lbPersonajeName;
            lightboxName.textContent = lbPersonajeName;
            if (lbUrls.length > 1) {
                lightboxCounter.textContent = `${lbIdx + 1} / ${lbUrls.length}`;
                lightboxPrev.style.display = 'flex';
                lightboxNext.style.display = 'flex';
            } else {
                lightboxCounter.textContent = '';
                lightboxPrev.style.display = 'none';
                lightboxNext.style.display = 'none';
            }
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
            lightboxImg.src = '';
        }

        lightboxClose.addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

        lightboxPrev.addEventListener('click', e => {
            e.stopPropagation();
            lbIdx = (lbIdx - 1 + lbUrls.length) % lbUrls.length;
            updateLightbox();
        });
        lightboxNext.addEventListener('click', e => {
            e.stopPropagation();
            lbIdx = (lbIdx + 1) % lbUrls.length;
            updateLightbox();
        });

        // Teclado: flechas y Escape
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape')      closeLightbox();
            if (e.key === 'ArrowRight') { lbIdx=(lbIdx+1)%lbUrls.length; updateLightbox(); }
            if (e.key === 'ArrowLeft')  { lbIdx=(lbIdx-1+lbUrls.length)%lbUrls.length; updateLightbox(); }
        });

        // Abrir lightbox al hacer click en retrato circular (delegado)
        contentEl.addEventListener('click', e => {
            const img = e.target.closest('.portrait-img');
            if (!img) return;
            const card = img.closest('.item-card');
            if (!card) return;
            // Encontrar el personaje por el botón ver-mas data-id
            const btn = card.querySelector('.btn-ver-mas');
            if (!btn) return;
            const item = currentItems.find(r => String(r.id) === String(btn.dataset.id));
            if (!item) return;
            const urls = getUrls(item);
            if (!urls.length) return;
            openLightbox(urls, 0, item.nombre);
        });

        // Abrir lightbox desde el panel de detalle (retrato grande y miniaturas)
        document.getElementById('detailOverlay').addEventListener('click', e => {
            // Click en retrato principal del detalle
            const mainImg = e.target.closest('.detail-portrait');
            if (mainImg) {
                const src = mainImg.src;
                // Buscar personaje activo
                const item = currentItems.find(r => {
                    const urls = getUrls(r);
                    return urls.some(u => src.includes(u.split('/').pop().split('?')[0]));
                });
                const urls = item ? getUrls(item) : [src];
                const idx  = item ? Math.max(0, urls.indexOf(src)) : 0;
                openLightbox(urls, idx, item?.nombre || '');
                return;
            }
            // Click en miniatura del detalle
            const thumb = e.target.closest('.detail-thumb');
            if (thumb) {
                const src = thumb.src;
                const allThumbs = [...document.querySelectorAll('.detail-thumb')];
                const allSrcs   = allThumbs.map(t => t.src);
                openLightbox(allSrcs, allThumbs.indexOf(thumb), lbPersonajeName);
            }
        });
    </script>
</body>
</html>
