<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Animales Espirituales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --green:#00ff88;--cyan:#00ccff;--red:#ff2244;
            --ink:#000000;--dark:#050f0a;--mid:#0a1a10;
            --text:#e8fff4;--dim:#00dd77;
            --danger:#ff2244;--danger-hover:#ff4466;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Crimson Text',Georgia,serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;z-index:0;
            background:
                radial-gradient(1px 1px at 12% 18%,rgba(0,255,136,.5) 0%,transparent 100%),
                radial-gradient(1px 1px at 78% 12%,rgba(0,204,255,.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 92% 68%,rgba(255,34,68,.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 35% 88%,rgba(0,255,136,.3) 0%,transparent 100%),
                radial-gradient(1px 1px at 60% 45%,rgba(0,204,255,.2) 0%,transparent 100%),
                radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,255,136,.04) 0%,transparent 60%);
            pointer-events:none}

        /* ── NAVBAR HUD ── */
        .navbar{position:sticky;top:0;z-index:200;height:56px;background:rgba(0,0,0,.94);backdrop-filter:blur(20px)}
        .navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),var(--red),transparent);background-size:300% 100%;animation:scan 4s linear infinite;box-shadow:0 0 8px rgba(0,255,136,.5)}
        .navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.25),transparent)}
        @keyframes scan{0%{background-position:-300% 0}100%{background-position:300% 0}}
        .nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 1.5rem;height:100%}
        .nav-ki{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green);position:relative;flex-shrink:0;box-shadow:0 0 8px var(--green),inset 0 0 6px rgba(0,255,136,.2);animation:kiCycle 6s linear infinite}
        .nav-ki::before{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle,#00ffcc 0%,rgba(0,255,136,.3) 60%,transparent 100%);animation:kiPulse 2s ease-in-out infinite alternate}
        @keyframes kiCycle{0%,100%{border-color:var(--green);box-shadow:0 0 8px var(--green)}33%{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan)}66%{border-color:var(--red);box-shadow:0 0 8px var(--red)}}
        @keyframes kiPulse{from{opacity:.4;transform:scale(.7)}to{opacity:1;transform:scale(1.1)}}
        .nav-logo-wrap{display:flex;align-items:center;gap:.7rem;text-decoration:none}
        .nav-logo-text{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.3em;background:linear-gradient(90deg,var(--green),var(--cyan),var(--red));background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoFlow 5s ease infinite}
        @keyframes logoFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .nav-right{display:flex;align-items:center;gap:.6rem}
        .btn-logout{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;background:none;border:1px solid rgba(255,34,68,.25);color:rgba(255,100,120,.6);padding:.28rem .7rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-logout:hover{border-color:var(--red);color:#ff6680;box-shadow:0 0 8px rgba(255,34,68,.2)}
        .nav-admin{display:flex;align-items:center;gap:.35rem;font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;color:var(--dim);text-decoration:none;border:1px solid rgba(0,255,136,.2);padding:.28rem .65rem;border-radius:2px;transition:all .2s;position:relative;overflow:hidden}
        .nav-admin::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.07),transparent);transform:translateX(-100%);transition:transform .4s}
        .nav-admin:hover{border-color:var(--green);color:#00ffcc;box-shadow:0 0 10px rgba(0,255,136,.15)}
        .nav-admin:hover::before{transform:translateX(100%)}

        /* ── LAYOUT ── */
        .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1rem;position:relative}
        .page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.4),rgba(0,204,255,.2),transparent)}
        .page-title{display:flex;align-items:center;gap:.9rem}
        .page-icon{font-size:1.8rem;filter:drop-shadow(0 0 10px rgba(0,255,136,.6))}
        .page-title h1{font-family:'Orbitron',sans-serif;font-size:clamp(.85rem,2.5vw,1.3rem);font-weight:900;letter-spacing:.18em;background:linear-gradient(90deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-meta{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.15em;color:rgba(0,255,136,.3);margin-top:.3rem}
        .btn-add{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.12em;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.35);color:var(--green);padding:.45rem 1rem;border-radius:2px;cursor:pointer;transition:all .25s}
        .btn-add:hover{background:rgba(0,255,136,.16);border-color:var(--green);box-shadow:0 0 15px rgba(0,255,136,.25)}

        /* ── LOADING ── */
        .loading,.empty-state{text-align:center;padding:4rem 1rem;font-style:italic;font-size:1.1rem;color:var(--dim)}
        .loading::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:8px;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

        /* ══════════════════════════════
           GRID CARDS
        ══════════════════════════════ */
        .content-list{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
            gap:1px;
            border:1px solid rgba(0,255,136,.08);
            background:rgba(0,255,136,.06);
        }

        .item-card{position:relative;background:var(--ink);overflow:hidden;cursor:pointer;animation:fadeUp .5s ease both;transition:background .3s}
        .item-card:hover{background:rgba(3,10,6,.97)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .card-num{position:absolute;top:.9rem;left:.9rem;z-index:3;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.1em;color:rgba(0,255,136,.5);background:rgba(0,0,0,.7);padding:.2rem .5rem;border:1px solid rgba(0,255,136,.2);border-radius:1px}

        /* Contador de imágenes múltiples */
        .img-count-badge{
            position:absolute;top:.9rem;right:.9rem;z-index:3;
            font-family:'Orbitron',sans-serif;font-size:.48rem;letter-spacing:.08em;
            color:rgba(0,255,136,.8);background:rgba(0,0,0,.75);
            padding:.18rem .5rem;border:1px solid rgba(0,255,136,.3);border-radius:1px;
            display:flex;align-items:center;gap:.3rem;
        }

        /* Imagen prominente */
        .card-image-wrap{position:relative;width:100%;height:220px;overflow:hidden}
        .card-image-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.7) 80%,rgba(0,0,0,.95) 100%);z-index:1}
        .card-image-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:2;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),transparent);transform:scaleX(0);transform-origin:left;transition:transform .4s;box-shadow:0 0 8px var(--green)}
        .item-card:hover .card-image-wrap::before{transform:scaleX(1)}
        .card-img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:brightness(.8) saturate(.9);transition:filter .4s,transform .5s;cursor:zoom-in}
        .item-card:hover .card-img{filter:brightness(.95) saturate(1.1);transform:scale(1.04)}
        .zoom-hint{position:absolute;bottom:.7rem;right:.7rem;z-index:3;font-family:'Orbitron',sans-serif;font-size:.48rem;letter-spacing:.1em;color:rgba(0,255,136,.8);background:rgba(0,0,0,.75);padding:.2rem .5rem;border:1px solid rgba(0,255,136,.3);border-radius:1px;opacity:0;transition:opacity .3s}
        .item-card:hover .zoom-hint{opacity:1}
        .card-placeholder{width:100%;height:220px;background:linear-gradient(135deg,var(--dark),var(--mid));display:flex;align-items:center;justify-content:center;font-size:4rem;filter:drop-shadow(0 0 10px rgba(0,255,136,.2))}

        .card-overlay-name{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:.8rem 1rem .6rem}
        .card-overlay-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:#fff;letter-spacing:.08em;text-shadow:0 0 10px rgba(0,255,136,.5),0 2px 4px rgba(0,0,0,.8)}

        .card-body{padding:.9rem 1rem .7rem;border-left:2px solid transparent;transition:border-color .3s}
        .item-card:hover .card-body{border-left-color:var(--green)}
        .card-desc{font-family:'Crimson Text',serif;font-style:italic;font-size:.9rem;color:rgba(170,255,221,.55);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        .btn-ver-mas{margin-top:.65rem;width:100%;font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:.12em;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.18);color:rgba(0,255,136,.5);padding:.38rem .5rem;border-radius:2px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
        .btn-ver-mas::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.08),transparent);transform:translateX(-100%);transition:transform .4s}
        .btn-ver-mas:hover{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(0,255,136,.18)}
        .btn-ver-mas:hover::before{transform:translateX(100%)}

        .card-actions{display:flex;gap:.4rem;margin-top:.5rem}
        .btn-edit,.btn-delete{flex:1;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.08em;border:none;padding:.32rem .4rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-edit{background:rgba(0,255,136,.07);color:#00ffcc;border:1px solid rgba(0,255,136,.25)}
        .btn-edit:hover{background:rgba(0,255,136,.18);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.2)}
        .btn-delete{background:rgba(255,34,68,.07);color:#ff6680;border:1px solid rgba(255,34,68,.25)}
        .btn-delete:hover{background:rgba(255,34,68,.18);border-color:var(--danger-hover);box-shadow:0 0 8px rgba(255,34,68,.2)}

        /* ══════════════════════════════
           PANEL DETALLE
        ══════════════════════════════ */
        .detail-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:1.5rem}
        .detail-overlay.open{display:flex}
        .detail-panel{background:rgba(2,10,6,.98);border:1px solid rgba(0,255,136,.2);border-radius:2px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;position:relative;animation:panelIn .3s cubic-bezier(.16,1,.3,1);box-shadow:0 0 60px rgba(0,0,0,.9),0 0 30px rgba(0,255,136,.05)}
        .detail-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--cyan),var(--green))}
        @keyframes panelIn{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

        /* Hero del panel */
        .detail-hero{position:relative;width:100%;height:300px;overflow:hidden}
        .detail-hero-img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:brightness(.75);transition:filter .3s;cursor:zoom-in}
        .detail-hero-img:hover{filter:brightness(.9)}
        .detail-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.85) 100%)}
        .detail-hero-title{position:absolute;bottom:0;left:0;right:0;z-index:1;padding:1.5rem 2rem 1.2rem}
        .detail-hero-name{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:600;color:#fff;letter-spacing:.1em;text-shadow:0 0 20px rgba(0,255,136,.6),0 2px 8px rgba(0,0,0,.8)}
        .detail-hero-placeholder{width:100%;height:300px;background:linear-gradient(135deg,var(--dark),var(--mid));display:flex;align-items:center;justify-content:center;font-size:5rem}

        .detail-close{position:absolute;top:1rem;right:1rem;z-index:10;width:32px;height:32px;background:rgba(255,34,68,.1);border:1px solid rgba(255,34,68,.3);border-radius:2px;color:#ff6680;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .detail-close:hover{background:rgba(255,34,68,.25);border-color:var(--red)}

        /* Galería de miniaturas en el panel */
        .detail-gallery{padding:.9rem 2rem;border-bottom:1px solid rgba(0,255,136,.08)}
        .detail-gallery-label{font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:.15em;color:rgba(0,255,136,.3);margin-bottom:.6rem}
        .detail-thumbs{display:flex;gap:.6rem;flex-wrap:wrap}
        .detail-thumb{
            width:64px;height:64px;object-fit:cover;object-position:top center;
            border:2px solid rgba(0,255,136,.15);border-radius:2px;
            cursor:zoom-in;filter:brightness(.75);transition:all .2s;
        }
        .detail-thumb.active,.detail-thumb:hover{border-color:var(--green);filter:brightness(1);box-shadow:0 0 10px rgba(0,255,136,.3)}

        .detail-body{padding:1.8rem 2rem 2rem}
        .detail-section{margin-bottom:1.4rem}
        .detail-section:last-child{margin-bottom:0}
        .detail-section-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.18em;color:rgba(0,255,136,.35);text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
        .detail-section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.2),transparent)}
        .detail-section p{font-family:'Crimson Text',serif;font-size:1.05rem;color:rgba(200,255,230,.75);line-height:1.75}

        /* ══════════════════════════════
           LIGHTBOX CON NAVEGACIÓN
        ══════════════════════════════ */
        .lightbox{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.97);backdrop-filter:blur(14px);align-items:center;justify-content:center;padding:1rem;cursor:zoom-out}
        .lightbox.open{display:flex}
        .lightbox-inner{position:relative;max-width:min(900px,96vw);max-height:90vh;animation:lbIn .25s cubic-bezier(.16,1,.3,1)}
        @keyframes lbIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
        .lightbox-img{display:block;max-width:100%;max-height:86vh;object-fit:contain;border:1px solid rgba(0,255,136,.2);box-shadow:0 0 50px rgba(0,0,0,.9),0 0 30px rgba(0,255,136,.08)}
        .lightbox-inner::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),transparent);box-shadow:0 0 8px rgba(0,255,136,.5)}
        .lightbox-close{position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:rgba(255,34,68,.12);border:1px solid rgba(255,34,68,.4);border-radius:50%;color:#ff6680;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 0 10px rgba(255,34,68,.2)}
        .lightbox-close:hover{background:rgba(255,34,68,.3);border-color:var(--red);transform:scale(1.1)}
        .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.3);border-radius:2px;color:var(--green);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 0 8px rgba(0,255,136,.1)}
        .lightbox-nav:hover{background:rgba(0,255,136,.12);border-color:var(--green);box-shadow:0 0 14px rgba(0,255,136,.3)}
        .lightbox-prev{left:-48px}
        .lightbox-next{right:-48px}
        .lightbox-info{position:absolute;bottom:-28px;left:0;right:0;display:flex;justify-content:space-between;align-items:center}
        .lightbox-name{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;color:rgba(0,255,204,.5)}
        .lightbox-counter{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.12em;color:rgba(0,255,136,.35)}

        @media(max-width:600px){
            .lightbox-prev{left:-36px}.lightbox-next{right:-36px}
            .lightbox-nav{width:28px;height:28px;font-size:1rem}
        }

        /* ══════════════════════════════
           MODAL FORMULARIO
        ══════════════════════════════ */
        .modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
        .modal.open{display:flex}
        .modal-content{background:var(--dark);border:1px solid rgba(0,255,136,.3);border-radius:2px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:panelIn .25s ease;box-shadow:0 0 30px rgba(0,255,136,.12)}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem;border-bottom:1px solid rgba(0,255,136,.15);position:sticky;top:0;background:var(--dark);z-index:1}
        .modal-header h2{font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;color:#00ffcc;letter-spacing:.15em}
        .modal-close{background:none;border:none;color:var(--dim);font-size:1.4rem;cursor:pointer;line-height:1;transition:color .2s}
        .modal-close:hover{color:var(--green)}
        .modal-form{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
        .form-group{display:flex;flex-direction:column;gap:.35rem}
        .form-group label{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.12em;color:rgba(0,255,136,.4);text-transform:uppercase}
        .form-group input[type="text"],.form-group textarea{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.2);border-radius:2px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:.6rem .85rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
        .form-group input[type="text"]:focus,.form-group textarea:focus{border-color:rgba(0,255,136,.55);box-shadow:0 0 0 3px rgba(0,255,136,.07),0 0 12px rgba(0,255,136,.08)}
        .form-group input[type="file"]{background:rgba(0,0,0,.5);border:1px dashed rgba(0,255,136,.2);border-radius:2px;color:var(--dim);font-family:'Crimson Text',serif;font-size:.9rem;padding:.5rem .85rem;width:100%;cursor:pointer;outline:none;transition:border-color .2s}
        .form-group input[type="file"]:hover{border-color:rgba(0,255,136,.45)}
        .image-preview{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
        .image-preview img{width:60px;height:60px;object-fit:cover;border:1px solid rgba(0,255,136,.25);border-radius:2px}
        .btn-primary{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:.15em;background:rgba(0,255,136,.09);border:1px solid rgba(0,255,136,.45);color:#00ffcc;padding:.7rem 1.5rem;border-radius:2px;cursor:pointer;transition:all .25s;align-self:flex-end}
        .btn-primary:hover{background:rgba(0,255,136,.2);border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.25)}

        /* ── TOAST ── */
        .toast{position:fixed;bottom:2rem;right:2rem;z-index:500;font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:.08em;padding:.7rem 1.2rem;border-radius:2px;border-left:2px solid var(--green);background:rgba(0,8,4,.97);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.6);opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.error{border-color:var(--danger-hover)}

        @media(max-width:600px){
            .content-list{grid-template-columns:1fr}
            .card-image-wrap{height:190px}
            .detail-hero{height:220px}
            .detail-body,.detail-gallery{padding-left:1.3rem;padding-right:1.3rem}
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo-wrap">
                <div class="nav-ki"></div>
                <span class="nav-logo-text">NAWARU</span>
            </a>
            <div class="nav-right">
                <button class="btn-logout" id="logoutBtn" style="display:none;">SALIR</button>
                <a href="admin.html" class="nav-admin" id="loginIcon">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    ADMIN
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <div class="page-title">
                <span class="page-icon">✨</span>
                <div>
                    <h1>Animales Espirituales</h1>
                    <div class="page-meta">// NAWARU UNIVERSE</div>
                </div>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ AGREGAR</button>
        </div>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Panel de detalle -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel">
            <button class="detail-close" id="detailClose">&times;</button>
            <div id="detailHero"></div>
            <div id="detailGallery" style="display:none"></div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-inner" id="lightboxInner">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
            <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
            <div class="lightbox-info">
                <div class="lightbox-name" id="lightboxName"></div>
                <div class="lightbox-counter" id="lightboxCounter"></div>
            </div>
        </div>
    </div>

    <!-- Modal formulario -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">AGREGAR ANIMAL ESPIRITUAL</h2>
                <button type="button" class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group"><label for="nombre">Nombre</label><input type="text" id="nombre" placeholder="Nombre del animal espiritual"></div>
                <div class="form-group"><label for="descripcion">Descripción</label><textarea id="descripcion" rows="4" placeholder="Describe el animal espiritual..."></textarea></div>
                <div class="form-group"><label for="imagenes">Imágenes (puedes seleccionar varias)</label><input type="file" id="imagenes" accept="image/*" multiple><div id="imagePreview" class="image-preview"></div></div>
                <button type="button" class="btn-primary" id="saveBtn">💾 GUARDAR</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL='https://shnwanhkuphlcevxnlvh.supabase.co';
        const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobndhbmhrdXBobGNldnhubHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTk2NTIsImV4cCI6MjA4NzM3NTY1Mn0.sUfY3j1wQS4-rjWAxY5a7m4ADGD2n2tYJSwEW0nfNNQ';
        const TABLE_NAME='animales', STORAGE_BUCKET='imagenes';
        const {createClient}=supabase, sb=createClient(SUPABASE_URL,SUPABASE_KEY);
        let isAdmin=false, editingId=null, newFiles=[], currentItems=[];

        // Lightbox state
        let lbUrls=[], lbIdx=0, lbAnimalName='';

        const logoutBtn=document.getElementById('logoutBtn'),loginIcon=document.getElementById('loginIcon'),addBtn=document.getElementById('addBtn'),loadingEl=document.getElementById('loading'),contentEl=document.getElementById('content'),modal=document.getElementById('modal'),modalTitle=document.getElementById('modalTitle'),closeModalBtn=document.getElementById('closeModal'),saveBtn=document.getElementById('saveBtn'),nombreInput=document.getElementById('nombre'),descInput=document.getElementById('descripcion'),imagenesInput=document.getElementById('imagenes'),imgPreview=document.getElementById('imagePreview'),toastEl=document.getElementById('toast');
        const detailOverlay=document.getElementById('detailOverlay'),detailHero=document.getElementById('detailHero'),detailGalleryEl=document.getElementById('detailGallery'),detailBody=document.getElementById('detailBody'),detailClose=document.getElementById('detailClose');
        const lightbox=document.getElementById('lightbox'),lightboxImg=document.getElementById('lightboxImg'),lightboxClose=document.getElementById('lightboxClose'),lightboxPrev=document.getElementById('lightboxPrev'),lightboxNext=document.getElementById('lightboxNext'),lightboxName=document.getElementById('lightboxName'),lightboxCounter=document.getElementById('lightboxCounter');

        function showToast(msg,type='ok'){toastEl.textContent=msg;toastEl.className='toast show'+(type==='error'?' error':'');setTimeout(()=>{toastEl.className='toast'},3200)}

        async function checkAuth(){const{data:{session}}=await sb.auth.getSession();isAdmin=!!session;logoutBtn.style.display=isAdmin?'inline-block':'none';loginIcon.style.display=isAdmin?'none':'flex';addBtn.style.display=isAdmin?'inline-block':'none'}

        logoutBtn.addEventListener('click',async()=>{await sb.auth.signOut();isAdmin=false;logoutBtn.style.display='none';loginIcon.style.display='flex';addBtn.style.display='none';renderItems(await fetchItems());showToast('Sesión cerrada')});

        async function fetchItems(){const{data,error}=await sb.from(TABLE_NAME).select('*').order('created_at',{ascending:false});if(error){showToast('Error al cargar datos','error');return[]}return data||[]}

        function getUrls(item){
            let urls=[];
            if(item.imagen_urls){try{urls=JSON.parse(item.imagen_urls)}catch{urls=[item.imagen_urls]}}
            else if(item.imagen_url){urls=[item.imagen_url]}
            return urls;
        }

        /* ── RENDER ── */
        function renderItems(items){
            currentItems=items;
            loadingEl.style.display='none';
            contentEl.innerHTML='';
            if(!items.length){contentEl.innerHTML='<p class="empty-state">Aún no hay animales espirituales registrados.</p>';return}

            items.forEach((item,i)=>{
                const card=document.createElement('div');
                card.className='item-card';
                card.style.animationDelay=`${i*.07}s`;

                const urls=getUrls(item);
                const mainUrl=urls[0]||null;

                const imgHTML=mainUrl
                    ?`<div class="card-image-wrap">
                          <img src="${mainUrl}" alt="${item.nombre}" class="card-img" loading="lazy" data-src="${mainUrl}" data-name="${item.nombre}">
                          <span class="zoom-hint">🔍 VER IMAGEN</span>
                          <div class="card-overlay-name">
                              <div class="card-overlay-title">${item.nombre||'—'}</div>
                          </div>
                       </div>`
                    :`<div class="card-placeholder">✨</div>
                      <div style="padding:.8rem 1rem .2rem">
                          <div class="card-overlay-title" style="color:#00ffcc;text-shadow:0 0 8px rgba(0,255,204,.4)">${item.nombre||'—'}</div>
                      </div>`;

                const shortDesc=item.descripcion
                    ? item.descripcion.length>100 ? item.descripcion.slice(0,100)+'…' : item.descripcion
                    : '';

                const actionsHTML=isAdmin?`<div class="card-actions"><button class="btn-edit" data-id="${item.id}">✏ EDITAR</button><button class="btn-delete" data-id="${item.id}">✕</button></div>`:'';
                const countBadge=urls.length>1?`<span class="img-count-badge">📷 ${urls.length}</span>`:'';

                card.innerHTML=`
                    <span class="card-num">${String(i+1).padStart(2,'0')}</span>
                    ${countBadge}
                    ${imgHTML}
                    <div class="card-body">
                        ${shortDesc?`<p class="card-desc">${shortDesc}</p>`:''}
                        <button class="btn-ver-mas" data-id="${item.id}">→ DESCUBRIR SER</button>
                        ${actionsHTML}
                    </div>
                `;
                contentEl.appendChild(card);
            });

            document.querySelectorAll('.card-img').forEach(img=>{
                img.addEventListener('click',e=>{
                    e.stopPropagation();
                    const item=currentItems.find(r=>r.imagen_urls||r.imagen_url)
                        ?currentItems.find(r=>{
                            const u=getUrls(r);
                            return u.includes(img.dataset.src)||u.some(x=>x===img.dataset.src);
                        }):null;
                    const urls=item?getUrls(item):[img.dataset.src];
                    openLightbox(urls,0,img.dataset.name);
                });
            });
            document.querySelectorAll('.btn-ver-mas').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openDetail(btn.dataset.id)}));
            document.querySelectorAll('.btn-edit').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openEdit(btn.dataset.id)}));
            document.querySelectorAll('.btn-delete').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();deleteItem(btn.dataset.id)}));
        }

        /* ── PANEL DETALLE ── */
        function openDetail(id){
            const item=currentItems.find(r=>String(r.id)===String(id));
            if(!item)return;

            const urls=getUrls(item);
            const mainUrl=urls[0]||null;

            const heroHTML=mainUrl
                ?`<div class="detail-hero">
                      <img src="${mainUrl}" alt="${item.nombre}" class="detail-hero-img" id="detailMainImg">
                      <div class="detail-hero-title"><div class="detail-hero-name">${item.nombre||'—'}</div></div>
                  </div>`
                :`<div class="detail-hero-placeholder">✨</div>
                  <div style="padding:1.5rem 2rem .5rem"><div class="detail-hero-name" style="color:#00ffcc;font-family:Cinzel,serif;font-size:1.6rem">${item.nombre||'—'}</div></div>`;

            detailHero.innerHTML=heroHTML;

            // Click en imagen hero → lightbox
            const heroImg=detailHero.querySelector('.detail-hero-img');
            if(heroImg){heroImg.addEventListener('click',()=>openLightbox(urls,0,item.nombre))}

            // Galería de miniaturas si hay varias
            if(urls.length>1){
                detailGalleryEl.style.display='block';
                const thumbsHTML=urls.map((u,idx)=>
                    `<img src="${u}" class="detail-thumb ${idx===0?'active':''}" data-idx="${idx}" alt="img ${idx+1}">`
                ).join('');
                detailGalleryEl.innerHTML=`
                    <div class="detail-gallery">
                        <div class="detail-gallery-label">// GALERÍA DE IMÁGENES</div>
                        <div class="detail-thumbs">${thumbsHTML}</div>
                    </div>`;

                detailGalleryEl.querySelectorAll('.detail-thumb').forEach((t,idx)=>{
                    t.addEventListener('click',()=>{
                        // Cambia imagen principal en hero
                        const mImg=document.getElementById('detailMainImg');
                        if(mImg)mImg.src=t.src;
                        detailGalleryEl.querySelectorAll('.detail-thumb').forEach(x=>x.classList.remove('active'));
                        t.classList.add('active');
                    });
                    // Click en miniatura → lightbox en esa imagen
                    t.addEventListener('dblclick',()=>openLightbox(urls,idx,item.nombre));
                });
            } else {
                detailGalleryEl.style.display='none';
            }

            detailBody.innerHTML=item.descripcion
                ?`<div class="detail-section">
                       <div class="detail-section-label">Descripción del Ser</div>
                       <p>${item.descripcion}</p>
                   </div>`
                :`<p style="font-style:italic;color:rgba(0,221,119,.35);text-align:center">Sin descripción disponible aún.</p>`;

            detailOverlay.classList.add('open');
            document.body.style.overflow='hidden';
        }

        function closeDetail(){detailOverlay.classList.remove('open');document.body.style.overflow=''}
        detailClose.addEventListener('click',closeDetail);
        detailOverlay.addEventListener('click',e=>{if(e.target===detailOverlay)closeDetail()});

        /* ── LIGHTBOX CON NAVEGACIÓN ── */
        function openLightbox(urls,idx,name){
            lbUrls=urls; lbIdx=idx; lbAnimalName=name||'';
            updateLightbox();
            lightbox.classList.add('open');
            document.body.style.overflow='hidden';
        }

        function updateLightbox(){
            lightboxImg.src=lbUrls[lbIdx];
            lightboxImg.alt=lbAnimalName;
            lightboxName.textContent=lbAnimalName;
            if(lbUrls.length>1){
                lightboxCounter.textContent=`${lbIdx+1} / ${lbUrls.length}`;
                lightboxPrev.style.display='flex';
                lightboxNext.style.display='flex';
            } else {
                lightboxCounter.textContent='';
                lightboxPrev.style.display='none';
                lightboxNext.style.display='none';
            }
        }

        function closeLightbox(){lightbox.classList.remove('open');document.body.style.overflow='';lightboxImg.src=''}
        lightboxClose.addEventListener('click',e=>{e.stopPropagation();closeLightbox()});
        lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox()});
        lightboxPrev.addEventListener('click',e=>{e.stopPropagation();lbIdx=(lbIdx-1+lbUrls.length)%lbUrls.length;updateLightbox()});
        lightboxNext.addEventListener('click',e=>{e.stopPropagation();lbIdx=(lbIdx+1)%lbUrls.length;updateLightbox()});

        document.addEventListener('keydown',e=>{
            if(lightbox.classList.contains('open')){
                if(e.key==='Escape'){closeLightbox();return}
                if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%lbUrls.length;updateLightbox()}
                if(e.key==='ArrowLeft') {lbIdx=(lbIdx-1+lbUrls.length)%lbUrls.length;updateLightbox()}
                return;
            }
            if(e.key==='Escape')closeDetail();
        });

        /* ── MODAL FORM ── */
        function openModal(title){modalTitle.textContent=title;modal.classList.add('open');nombreInput.focus()}
        function closeModalFn(){modal.classList.remove('open');nombreInput.value='';descInput.value='';imagenesInput.value='';imgPreview.innerHTML='';editingId=null;newFiles=[]}
        addBtn.addEventListener('click',()=>{editingId=null;openModal('AGREGAR ANIMAL ESPIRITUAL')});
        closeModalBtn.addEventListener('click',closeModalFn);
        modal.addEventListener('click',e=>{if(e.target===modal)closeModalFn()});
        imagenesInput.addEventListener('change',()=>{newFiles=Array.from(imagenesInput.files);imgPreview.innerHTML='';newFiles.forEach(file=>{const reader=new FileReader();reader.onload=e=>{const img=document.createElement('img');img.src=e.target.result;imgPreview.appendChild(img)};reader.readAsDataURL(file)})});

        function openEdit(id){
            const item=currentItems.find(r=>String(r.id)===String(id));
            if(!item)return;
            editingId=id;nombreInput.value=item.nombre||'';descInput.value=item.descripcion||'';
            imgPreview.innerHTML='';
            getUrls(item).forEach(u=>{const img=document.createElement('img');img.src=u;imgPreview.appendChild(img)});
            openModal('EDITAR ANIMAL ESPIRITUAL');
        }

        saveBtn.addEventListener('click',async()=>{
            const nombre=nombreInput.value.trim();
            if(!nombre){showToast('El nombre es obligatorio','error');return}
            saveBtn.textContent='⏳ GUARDANDO...';saveBtn.disabled=true;
            const uploadedUrls=[];
            for(const file of newFiles){
                const ext=file.name.split('.').pop();
                const path=`animales/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
                const{error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:true});
                if(!upErr){const{data:urlData}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);uploadedUrls.push(urlData.publicUrl)}
            }
            const payload={nombre,descripcion:descInput.value.trim()};
            if(uploadedUrls.length)payload.imagen_urls=JSON.stringify(uploadedUrls);
            let error;
            if(editingId){({error}=await sb.from(TABLE_NAME).update(payload).eq('id',editingId))}
            else{({error}=await sb.from(TABLE_NAME).insert([payload]))}
            saveBtn.textContent='💾 GUARDAR';saveBtn.disabled=false;
            if(error){showToast('Error: '+error.message,'error')}
            else{showToast(editingId?'Animal actualizado':'Animal agregado');closeModalFn();renderItems(await fetchItems())}
        });

        async function deleteItem(id){
            if(!confirm('¿Eliminar este animal espiritual?'))return;
            const{error}=await sb.from(TABLE_NAME).delete().eq('id',id);
            if(error){showToast('Error al eliminar','error')}
            else{showToast('Animal eliminado');renderItems(await fetchItems())}
        }

        (async()=>{await checkAuth();renderItems(await fetchItems())})();
    </script>
</body>
</html>
