<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Reinos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--green:#00ff88;--cyan:#00ccff;--red:#ff2244;--ink:#000000;--dark:#050f0a;--mid:#0a1a10;--text:#e8fff4;--dim:#00dd77;--danger:#ff2244;--danger-hover:#ff4466}
        html{scroll-behavior:smooth}
        body{font-family:'Crimson Text',Georgia,serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(1px 1px at 10% 20%,rgba(0,255,136,.5) 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,rgba(0,204,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 65%,rgba(255,34,68,.4) 0%,transparent 100%),radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,255,136,.04) 0%,transparent 60%);pointer-events:none}

        /* ── NAVBAR ── */
        .navbar{position:sticky;top:0;z-index:200;height:56px;background:rgba(0,0,0,.94);backdrop-filter:blur(20px)}
        .navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),var(--red),transparent);background-size:300% 100%;animation:scan 4s linear infinite;box-shadow:0 0 8px rgba(0,255,136,.5)}
        .navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.25),transparent)}
        @keyframes scan{0%{background-position:-300% 0}100%{background-position:300% 0}}
        .nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 1.5rem;height:100%}
        .nav-ki{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green);position:relative;flex-shrink:0;box-shadow:0 0 8px var(--green),inset 0 0 6px rgba(0,255,136,.2);animation:kiCycle 6s linear infinite}
        .nav-ki::before{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle,#00ffcc 0%,rgba(0,255,136,.3) 60%,transparent 100%);animation:kiPulse 2s ease-in-out infinite alternate}
        @keyframes kiCycle{0%,100%{border-color:var(--green);box-shadow:0 0 8px var(--green)}33%{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan)}66%{border-color:var(--red);box-shadow:0 0 8px var(--red)}}
        @keyframes kiPulse{from{opacity:.4;transform:scale(.7)}to{opacity:1;transform:scale(1.1)}}
        .nav-logo-wrap{display:flex;align-items:center;gap:.7rem;text-decoration:none}
        .nav-logo-text{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.3em;background:linear-gradient(90deg,var(--green),var(--cyan),var(--red));background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoFlow 5s ease infinite}
        @keyframes logoFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .nav-right{display:flex;align-items:center;gap:.6rem}
        .btn-logout{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;background:none;border:1px solid rgba(255,34,68,.25);color:rgba(255,100,120,.6);padding:.28rem .7rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-logout:hover{border-color:var(--red);color:#ff6680}
        .nav-admin{display:flex;align-items:center;gap:.35rem;font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.1em;color:var(--dim);text-decoration:none;border:1px solid rgba(0,255,136,.2);padding:.28rem .65rem;border-radius:2px;transition:all .2s;position:relative;overflow:hidden}
        .nav-admin::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.07),transparent);transform:translateX(-100%);transition:transform .4s}
        .nav-admin:hover{border-color:var(--green);color:#00ffcc;box-shadow:0 0 10px rgba(0,255,136,.15)}
        .nav-admin:hover::before{transform:translateX(100%)}

        /* ── LAYOUT ── */
        .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;position:relative}
        .page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.4),rgba(0,204,255,.2),transparent)}
        .page-title{display:flex;align-items:center;gap:.9rem}
        .page-icon{font-size:1.8rem;filter:drop-shadow(0 0 10px rgba(0,255,136,.6))}
        .page-title-block h1{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3vw,1.5rem);font-weight:900;letter-spacing:.2em;background:linear-gradient(90deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-meta{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.15em;color:rgba(0,255,136,.3);margin-top:.3rem}
        .btn-add{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.12em;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.35);color:var(--green);padding:.45rem 1rem;border-radius:2px;cursor:pointer;transition:all .25s}
        .btn-add:hover{background:rgba(0,255,136,.16);border-color:var(--green);box-shadow:0 0 15px rgba(0,255,136,.25)}
        .loading,.empty-state{text-align:center;padding:4rem 1rem;font-style:italic;font-size:1.1rem;color:var(--dim)}
        .loading::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:8px;animation:pulse 1s infinite;box-shadow:0 0 6px var(--green)}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        .section-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
        .section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.3),transparent)}
        .section-line.right{background:linear-gradient(90deg,transparent,rgba(0,255,136,.3))}
        .section-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.2em;color:rgba(0,255,136,.3);white-space:nowrap}

        /* ══════════════════════════════
           GRID — CARDS DE REINO
        ══════════════════════════════ */
        .content-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem}

        .item-card{
            position:relative;background:rgba(5,15,10,.9);
            border:1px solid rgba(0,255,136,.15);border-radius:2px;
            overflow:hidden;animation:fadeUp .5s ease both;
            transition:border-color .3s,box-shadow .3s,transform .3s;
        }
        .item-card:hover{border-color:rgba(0,255,136,.5);box-shadow:0 0 24px rgba(0,255,136,.2),0 0 48px rgba(0,204,255,.07),0 8px 30px rgba(0,0,0,.7);transform:translateY(-3px)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        /* Número */
        .card-num{position:absolute;top:.8rem;left:.9rem;z-index:3;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.12em;color:rgba(0,255,136,.5);background:rgba(0,0,0,.65);border:1px solid rgba(0,255,136,.2);padding:.15rem .45rem;border-radius:2px;backdrop-filter:blur(4px)}

        /* Imagen panorámica */
        .card-image-wrap{position:relative;height:220px;overflow:hidden}
        .card-image-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.2) 60%,rgba(5,15,10,.95) 100%);pointer-events:none}
        .card-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.78) saturate(.95);transition:filter .4s,transform .5s;cursor:zoom-in}
        .item-card:hover .card-img{filter:brightness(.95) saturate(1.05);transform:scale(1.06)}

        /* Hint de zoom */
        .zoom-hint{position:absolute;top:.8rem;right:.9rem;z-index:3;width:30px;height:30px;background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px);color:rgba(0,255,136,.9)}
        .item-card:hover .zoom-hint{opacity:1}

        /* Placeholder */
        .card-placeholder{width:100%;height:220px;background:linear-gradient(135deg,var(--dark),var(--mid));display:flex;align-items:center;justify-content:center;font-size:4rem;filter:drop-shadow(0 0 10px rgba(0,255,136,.15))}

        /* Overlay de texto sobre imagen */
        .card-overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:1.2rem 1.2rem .8rem}
        .card-reino-name{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:600;color:#fff;letter-spacing:.1em;text-shadow:0 2px 8px rgba(0,0,0,.9),0 0 16px rgba(0,255,136,.25);margin-bottom:.2rem}
        .card-desc-preview{font-family:'Crimson Text',serif;font-size:.83rem;font-style:italic;color:rgba(200,255,230,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 4px rgba(0,0,0,.9)}

        /* Cuerpo sin imagen */
        .card-no-img-body{padding:1.1rem 1.2rem .6rem}
        .card-no-img-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:#00ffcc;letter-spacing:.08em;text-shadow:0 0 8px rgba(0,255,204,.3);margin-bottom:.3rem}
        .card-no-img-desc{font-family:'Crimson Text',serif;font-size:.88rem;font-style:italic;color:rgba(170,255,221,.5);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        /* Footer */
        .card-footer{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem;border-top:1px solid rgba(0,255,136,.08)}
        .btn-ver-mas{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.12em;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);color:rgba(0,255,136,.6);padding:.35rem .9rem;border-radius:2px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
        .btn-ver-mas::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.08),transparent);transform:translateX(-100%);transition:transform .4s}
        .btn-ver-mas:hover{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(0,255,136,.2)}
        .btn-ver-mas:hover::before{transform:translateX(100%)}
        .card-admin-btns{display:flex;gap:.35rem}
        .btn-edit,.btn-delete{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.08em;border:none;padding:.3rem .55rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-edit{background:rgba(0,255,136,.07);color:#00ffcc;border:1px solid rgba(0,255,136,.25)}
        .btn-edit:hover{background:rgba(0,255,136,.18);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.2)}
        .btn-delete{background:rgba(255,34,68,.07);color:#ff6680;border:1px solid rgba(255,34,68,.25)}
        .btn-delete:hover{background:rgba(255,34,68,.18);border-color:var(--danger-hover);box-shadow:0 0 8px rgba(255,34,68,.2)}

        /* ══════════════════════════════
           PANEL DETALLE
        ══════════════════════════════ */
        .detail-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:1.5rem}
        .detail-overlay.open{display:flex}
        .detail-panel{background:rgba(2,10,6,.98);border:1px solid rgba(0,255,136,.2);border-radius:2px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative;animation:panelIn .3s cubic-bezier(.16,1,.3,1);box-shadow:0 0 60px rgba(0,0,0,.9),0 0 30px rgba(0,255,136,.05)}
        .detail-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--cyan),var(--green))}
        @keyframes panelIn{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .detail-hero{position:relative;height:300px;overflow:hidden}
        .detail-hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.72);cursor:zoom-in;transition:filter .3s}
        .detail-hero-img:hover{filter:brightness(.88)}
        .detail-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(2,10,6,.98) 100%);pointer-events:none}
        .detail-hero-placeholder{width:100%;height:300px;background:linear-gradient(135deg,var(--dark),var(--mid));display:flex;align-items:center;justify-content:center;font-size:5rem}
        .detail-hero-title{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:1.5rem 2rem 1.2rem}
        .detail-name{font-family:'Cinzel',serif;font-size:1.7rem;font-weight:600;color:#fff;letter-spacing:.1em;text-shadow:0 2px 12px rgba(0,0,0,.9),0 0 20px rgba(0,255,136,.2);margin-bottom:.4rem}
        .detail-hud-row{display:flex;align-items:center;gap:.6rem}
        .detail-hud-tag{font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:.15em;color:rgba(0,255,136,.5);border:1px solid rgba(0,255,136,.2);padding:.15rem .5rem;border-radius:2px}
        .detail-close{position:absolute;top:1rem;right:1rem;z-index:10;width:32px;height:32px;background:rgba(0,0,0,.75);border:1px solid rgba(255,34,68,.3);border-radius:2px;color:#ff6680;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
        .detail-close:hover{background:rgba(255,34,68,.2);border-color:var(--red)}
        .detail-body{padding:1.8rem 2rem 2rem}
        .detail-section-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.18em;color:rgba(0,255,136,.35);text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
        .detail-section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,136,.2),transparent)}
        .detail-desc{font-family:'Crimson Text',serif;font-size:1.08rem;color:rgba(200,255,230,.8);line-height:1.85}

        /* ══════════════════════════════
           LIGHTBOX
        ══════════════════════════════ */
        .lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:1.5rem;cursor:zoom-out}
        .lightbox.open{display:flex}
        .lightbox-inner{position:relative;max-width:min(960px,96vw);max-height:92vh;animation:lbIn .25s cubic-bezier(.16,1,.3,1)}
        @keyframes lbIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
        .lightbox-img{display:block;max-width:100%;max-height:88vh;object-fit:contain;border-radius:2px;border:1px solid rgba(0,255,136,.2);box-shadow:0 0 50px rgba(0,0,0,.95),0 0 30px rgba(0,255,136,.08)}
        .lightbox-inner::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--green),var(--cyan),transparent);box-shadow:0 0 8px rgba(0,255,136,.5)}
        .lightbox-close{position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:rgba(255,34,68,.12);border:1px solid rgba(255,34,68,.4);border-radius:50%;color:#ff6680;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:1;box-shadow:0 0 10px rgba(255,34,68,.2)}
        .lightbox-close:hover{background:rgba(255,34,68,.3);border-color:var(--red);transform:scale(1.1)}
        .lightbox-caption{position:absolute;bottom:-26px;left:0;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;color:rgba(0,255,204,.4)}

        /* ── MODAL FORM ── */
        .modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
        .modal.open{display:flex}
        .modal-content{background:var(--dark);border:1px solid rgba(0,255,136,.3);border-radius:2px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:panelIn .25s ease;box-shadow:0 0 30px rgba(0,255,136,.12)}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem;border-bottom:1px solid rgba(0,255,136,.15);position:sticky;top:0;background:var(--dark);z-index:1}
        .modal-header h2{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;color:#00ffcc;letter-spacing:.15em}
        .modal-close{background:none;border:none;color:var(--dim);font-size:1.4rem;cursor:pointer;line-height:1;transition:color .2s}
        .modal-close:hover{color:var(--green)}
        .modal-form{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
        .form-group{display:flex;flex-direction:column;gap:.35rem}
        .form-group label{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.12em;color:rgba(0,255,136,.4);text-transform:uppercase}
        .form-group input[type="text"],.form-group textarea{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.2);border-radius:2px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:.6rem .85rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
        .form-group input[type="text"]:focus,.form-group textarea:focus{border-color:rgba(0,255,136,.55);box-shadow:0 0 0 3px rgba(0,255,136,.07)}
        .form-group input[type="file"]{background:rgba(0,0,0,.5);border:1px dashed rgba(0,255,136,.2);border-radius:2px;color:var(--dim);font-family:'Crimson Text',serif;font-size:.9rem;padding:.5rem .85rem;width:100%;cursor:pointer;outline:none;transition:border-color .2s}
        .form-group input[type="file"]:hover{border-color:rgba(0,255,136,.45)}
        .image-preview{margin-top:.5rem}
        .image-preview img{max-width:100%;max-height:130px;object-fit:cover;border:1px solid rgba(0,255,136,.25);border-radius:2px}
        .btn-primary{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:.15em;background:rgba(0,255,136,.09);border:1px solid rgba(0,255,136,.45);color:#00ffcc;padding:.7rem 1.5rem;border-radius:2px;cursor:pointer;transition:all .25s;align-self:flex-end}
        .btn-primary:hover{background:rgba(0,255,136,.2);border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.25)}
        .toast{position:fixed;bottom:2rem;right:2rem;z-index:600;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.08em;padding:.7rem 1.2rem;border-radius:2px;border-left:2px solid var(--green);background:rgba(0,8,4,.97);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.6);opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.error{border-color:var(--danger-hover)}

        @media(max-width:600px){.content-list{grid-template-columns:1fr}.card-image-wrap{height:180px}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo-wrap">
                <div class="nav-ki"></div>
                <span class="nav-logo-text">NAWARU</span>
            </a>
            <div class="nav-right">
                <button class="btn-logout" id="logoutBtn" style="display:none;">SALIR</button>
                <a href="admin.html" class="nav-admin" id="loginIcon">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    ADMIN
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <div class="page-title">
                <span class="page-icon">👑</span>
                <div class="page-title-block">
                    <h1>Reinos</h1>
                    <div class="page-meta">// NAWARU UNIVERSE</div>
                </div>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ AGREGAR</button>
        </div>
        <div class="section-header">
            <div class="section-line"></div>
            <span class="section-label">// TERRITORIOS CONOCIDOS</span>
            <div class="section-line right"></div>
        </div>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Panel detalle -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel">
            <button class="detail-close" id="detailClose">&times;</button>
            <div id="detailHero"></div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-inner">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
    </div>

    <!-- Modal form -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">AGREGAR REINO</h2><button type="button" class="modal-close" id="closeModal">&times;</button></div>
            <div class="modal-form">
                <div class="form-group"><label for="nombre">Nombre del Reino</label><input type="text" id="nombre" placeholder="Ej: Reino del Norte"></div>
                <div class="form-group"><label for="descripcion">Descripción</label><textarea id="descripcion" rows="5" placeholder="Describe el reino..."></textarea></div>
                <div class="form-group"><label for="imagen">Imagen</label><input type="file" id="imagen" accept="image/*"><div id="imagePreview" class="image-preview"></div></div>
                <button type="button" class="btn-primary" id="saveBtn">💾 GUARDAR</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL='https://shnwanhkuphlcevxnlvh.supabase.co';
        const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobndhbmhrdXBobGNldnhubHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTk2NTIsImV4cCI6MjA4NzM3NTY1Mn0.sUfY3j1wQS4-rjWAxY5a7m4ADGD2n2tYJSwEW0nfNNQ';
        const TABLE_NAME='reinos',STORAGE_BUCKET='imagenes';
        const{createClient}=supabase,sb=createClient(SUPABASE_URL,SUPABASE_KEY);
        let isAdmin=false,editingId=null,currentItems=[];

        const logoutBtn=document.getElementById('logoutBtn'),loginIcon=document.getElementById('loginIcon'),addBtn=document.getElementById('addBtn'),loadingEl=document.getElementById('loading'),contentEl=document.getElementById('content'),modal=document.getElementById('modal'),modalTitle=document.getElementById('modalTitle'),closeModalBtn=document.getElementById('closeModal'),saveBtn=document.getElementById('saveBtn'),nombreInput=document.getElementById('nombre'),descInput=document.getElementById('descripcion'),imagenInput=document.getElementById('imagen'),imgPreview=document.getElementById('imagePreview'),toastEl=document.getElementById('toast');
        const detailOverlay=document.getElementById('detailOverlay'),detailHero=document.getElementById('detailHero'),detailBody=document.getElementById('detailBody'),detailClose=document.getElementById('detailClose');
        const lightbox=document.getElementById('lightbox'),lightboxImg=document.getElementById('lightboxImg'),lightboxClose=document.getElementById('lightboxClose'),lightboxCaption=document.getElementById('lightboxCaption');

        function showToast(msg,type='ok'){toastEl.textContent=msg;toastEl.className='toast show'+(type==='error'?' error':'');setTimeout(()=>{toastEl.className='toast'},3200)}

        async function checkAuth(){const{data:{session}}=await sb.auth.getSession();isAdmin=!!session;logoutBtn.style.display=isAdmin?'inline-block':'none';loginIcon.style.display=isAdmin?'none':'flex';addBtn.style.display=isAdmin?'inline-block':'none'}

        logoutBtn.addEventListener('click',async()=>{await sb.auth.signOut();isAdmin=false;logoutBtn.style.display='none';loginIcon.style.display='flex';addBtn.style.display='none';renderItems(await fetchItems());showToast('Sesión cerrada')});

        async function fetchItems(){const{data,error}=await sb.from(TABLE_NAME).select('*').order('created_at',{ascending:false});if(error){showToast('Error al cargar','error');return[]}return data||[]}

        function renderItems(items){
            currentItems=items;
            loadingEl.style.display='none';
            contentEl.innerHTML='';
            if(!items.length){contentEl.innerHTML='<p class="empty-state">Aún no hay reinos registrados.</p>';return}

            items.forEach((item,i)=>{
                const card=document.createElement('div');
                card.className='item-card';
                card.style.animationDelay=`${i*.08}s`;

                let topHTML='';
                if(item.imagen_url){
                    topHTML=`<div class="card-image-wrap">
                        <img src="${item.imagen_url}" alt="${item.nombre}" class="card-img" loading="lazy">
                        <span class="zoom-hint">🔍</span>
                        <div class="card-overlay">
                            <div class="card-reino-name">${item.nombre||'—'}</div>
                            ${item.descripcion?`<div class="card-desc-preview">${item.descripcion}</div>`:''}
                        </div>
                    </div>`;
                } else {
                    topHTML=`<div class="card-placeholder">👑</div>
                    <div class="card-no-img-body">
                        <div class="card-no-img-name">${item.nombre||'—'}</div>
                        ${item.descripcion?`<div class="card-no-img-desc">${item.descripcion}</div>`:''}
                    </div>`;
                }

                const actionsHTML=isAdmin?`<div class="card-admin-btns"><button class="btn-edit" data-id="${item.id}">✏</button><button class="btn-delete" data-id="${item.id}">✕</button></div>`:'';

                card.innerHTML=`
                    <div class="card-num">${String(i+1).padStart(2,'0')}</div>
                    ${topHTML}
                    <div class="card-footer">
                        <button class="btn-ver-mas" data-id="${item.id}">→ VER REINO</button>
                        ${actionsHTML}
                    </div>`;
                contentEl.appendChild(card);
            });

            // Zoom en imagen
            contentEl.querySelectorAll('.card-img').forEach(img=>{
                img.addEventListener('click',e=>{
                    e.stopPropagation();
                    const nombre=img.closest('.item-card').querySelector('.card-reino-name')?.textContent||'';
                    openLightbox(img.src,nombre);
                });
            });
            contentEl.querySelectorAll('.btn-ver-mas').forEach(btn=>btn.addEventListener('click',()=>openDetail(btn.dataset.id)));
            contentEl.querySelectorAll('.btn-edit').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openEdit(btn.dataset.id)}));
            contentEl.querySelectorAll('.btn-delete').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();deleteItem(btn.dataset.id)}));
        }

        /* ── DETALLE ── */
        function openDetail(id){
            const item=currentItems.find(r=>String(r.id)===String(id));
            if(!item)return;
            if(item.imagen_url){
                detailHero.innerHTML=`<div class="detail-hero">
                    <img src="${item.imagen_url}" alt="${item.nombre}" class="detail-hero-img" id="dhi">
                    <div class="detail-hero-title">
                        <div class="detail-name">${item.nombre||'—'}</div>
                        <div class="detail-hud-row"><span class="detail-hud-tag">REINO</span><span class="detail-hud-tag">NAWARU</span></div>
                    </div>
                </div>`;
                document.getElementById('dhi').addEventListener('click',()=>openLightbox(item.imagen_url,item.nombre));
            } else {
                detailHero.innerHTML=`<div class="detail-hero-placeholder">👑</div>
                <div style="padding:1.5rem 2rem .5rem"><div class="detail-name">${item.nombre||'—'}</div></div>`;
            }
            detailBody.innerHTML=item.descripcion
                ?`<div class="detail-section-label">Descripción</div><p class="detail-desc">${item.descripcion}</p>`
                :`<p style="font-style:italic;color:rgba(0,221,119,.4);text-align:center">Sin descripción registrada.</p>`;
            detailClose.onclick=closeDetail;
            detailOverlay.classList.add('open');
            document.body.style.overflow='hidden';
        }
        function closeDetail(){detailOverlay.classList.remove('open');document.body.style.overflow=''}
        detailOverlay.addEventListener('click',e=>{if(e.target===detailOverlay)closeDetail()});

        /* ── LIGHTBOX ── */
        function openLightbox(src,caption){lightboxImg.src=src;lightboxCaption.textContent=caption||'';lightbox.classList.add('open');document.body.style.overflow='hidden'}
        function closeLightbox(){lightbox.classList.remove('open');document.body.style.overflow='';lightboxImg.src=''}
        lightboxClose.addEventListener('click',e=>{e.stopPropagation();closeLightbox()});
        lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox()});
        document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeDetail()}});

        /* ── MODAL ── */
        function openModal(title){modalTitle.textContent=title;modal.classList.add('open');nombreInput.focus()}
        function closeModalFn(){modal.classList.remove('open');nombreInput.value='';descInput.value='';imagenInput.value='';imgPreview.innerHTML='';editingId=null}
        addBtn.addEventListener('click',()=>{editingId=null;openModal('AGREGAR REINO')});
        closeModalBtn.addEventListener('click',closeModalFn);
        modal.addEventListener('click',e=>{if(e.target===modal)closeModalFn()});
        imagenInput.addEventListener('change',()=>{const file=imagenInput.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{imgPreview.innerHTML=`<img src="${e.target.result}" alt="Vista previa">`};reader.readAsDataURL(file)});
        function openEdit(id){const item=currentItems.find(r=>String(r.id)===String(id));if(!item)return;editingId=id;nombreInput.value=item.nombre||'';descInput.value=item.descripcion||'';imgPreview.innerHTML=item.imagen_url?`<img src="${item.imagen_url}" alt="imagen actual">`:'';openModal('EDITAR REINO')}
        saveBtn.addEventListener('click',async()=>{const nombre=nombreInput.value.trim();if(!nombre){showToast('El nombre es obligatorio','error');return}saveBtn.textContent='⏳ GUARDANDO...';saveBtn.disabled=true;let imagen_url=null;if(imagenInput.files[0]){const file=imagenInput.files[0];const ext=file.name.split('.').pop();const path=`reinos/${Date.now()}.${ext}`;const{error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:true});if(!upErr){const{data:urlData}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);imagen_url=urlData.publicUrl}}const payload={nombre,descripcion:descInput.value.trim()};if(imagen_url)payload.imagen_url=imagen_url;let error;if(editingId){({error}=await sb.from(TABLE_NAME).update(payload).eq('id',editingId))}else{({error}=await sb.from(TABLE_NAME).insert([payload]))}saveBtn.textContent='💾 GUARDAR';saveBtn.disabled=false;if(error){showToast('Error: '+error.message,'error')}else{showToast(editingId?'Reino actualizado':'Reino agregado');closeModalFn();renderItems(await fetchItems())}});
        async function deleteItem(id){if(!confirm('¿Eliminar este reino?'))return;const{error}=await sb.from(TABLE_NAME).delete().eq('id',id);if(error){showToast('Error al eliminar','error')}else{showToast('Reino eliminado');renderItems(await fetchItems())}}

        (async()=>{await checkAuth();renderItems(await fetchItems())})();
    </script>
</body>
</html>
