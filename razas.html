<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Razas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--gold:#00ff88;--gold-light:#00ffcc;--gold-dark:#00cc66;--ink:#000000;--parchment:#050f0a;--mist:#0a1a10;--text:#e8fff4;--text-dim:#00dd77;--danger:#ff2244;--danger-hover:#ff4466}
        html{scroll-behavior:smooth}
        body{font-family:'Crimson Text',Georgia,serif;background-color:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,255,136,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,204,255,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
        .navbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,255,136,.3);box-shadow:0 2px 20px rgba(0,255,136,.1)}
        .nav-container{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 1.5rem;height:60px}
        .logo-text{font-family:'Cinzel Decorative',serif;font-size:1.3rem;font-weight:700;letter-spacing:.2em;text-decoration:none;background:linear-gradient(90deg,#00ff88,#00ccff,#ff2244);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .nav-actions{display:flex;align-items:center;gap:.75rem}
        .login-icon{color:var(--text-dim);transition:color .2s,filter .2s;display:flex;align-items:center}
        .login-icon:hover{color:var(--gold);filter:drop-shadow(0 0 6px #00ff88)}
        .btn-logout{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;background:none;border:1px solid rgba(0,255,136,.3);color:var(--text-dim);padding:.35rem .8rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-logout:hover{border-color:var(--danger);color:var(--danger-hover)}
        .container{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.2rem;border-bottom:1px solid rgba(0,255,136,.2)}
        .page-title{display:flex;align-items:center;gap:.8rem}
        .page-icon{font-size:2rem;filter:drop-shadow(0 0 8px rgba(0,255,136,.5))}
        .page-title h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:700;letter-spacing:.12em;background:linear-gradient(90deg,#00ff88,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .btn-add{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.4);color:var(--gold-light);padding:.5rem 1.2rem;border-radius:2px;cursor:pointer;transition:all .25s}
        .btn-add:hover{background:rgba(0,255,136,.18);border-color:var(--gold);box-shadow:0 0 15px rgba(0,255,136,.3)}
        .loading,.empty-state{text-align:center;padding:4rem 1rem;font-style:italic;font-size:1.1rem;color:var(--text-dim)}
        .loading::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:8px;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        .content-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
        .item-card{background:rgba(5,15,10,.85);border:1px solid rgba(0,255,136,.3);border-radius:2px;overflow:hidden;transition:transform .3s,border-color .3s,box-shadow .3s;animation:fadeUp .5s ease both;box-shadow:0 0 8px rgba(0,255,136,.06)}
        .item-card:hover{transform:translateY(-4px);border-color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,.3),0 0 40px rgba(0,204,255,.1),0 8px 30px rgba(0,0,0,.6)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .item-image{width:100%;height:180px;object-fit:cover;display:block;filter:brightness(.85);transition:filter .3s,transform .4s}
        .item-card:hover .item-image{filter:brightness(.97);transform:scale(1.03)}
        .item-image-placeholder{width:100%;height:180px;background:linear-gradient(135deg,var(--parchment),var(--mist));display:flex;align-items:center;justify-content:center;font-size:3.5rem}
        .item-body{padding:1.3rem 1.3rem .8rem}
        .item-name{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:#00ffcc;letter-spacing:.08em;margin-bottom:.6rem;text-shadow:0 0 8px rgba(0,255,204,.4)}
        .item-desc{font-size:.95rem;color:#aaffdd;line-height:1.6}
        .item-actions{display:flex;gap:.5rem;padding:.75rem 1.3rem 1rem;border-top:1px solid rgba(0,255,136,.1)}
        .btn-edit,.btn-delete{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;border:none;padding:.35rem .9rem;border-radius:2px;cursor:pointer;transition:all .2s}
        .btn-edit{background:rgba(0,255,136,.08);color:#00ffcc;border:1px solid rgba(0,255,136,.35)}
        .btn-edit:hover{background:rgba(0,255,136,.2);border-color:var(--gold);box-shadow:0 0 10px rgba(0,255,136,.25)}
        .btn-delete{background:rgba(255,34,68,.08);color:#ff6680;border:1px solid rgba(255,34,68,.3)}
        .btn-delete:hover{background:rgba(255,34,68,.2);border-color:var(--danger-hover);box-shadow:0 0 10px rgba(255,34,68,.25)}
        .modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
        .modal.open{display:flex}
        .modal-content{background:#050f0a;border:1px solid rgba(0,255,136,.35);border-radius:2px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:modalIn .25s ease;box-shadow:0 0 30px rgba(0,255,136,.15)}
        @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem;border-bottom:1px solid rgba(0,255,136,.2);position:sticky;top:0;background:#050f0a;z-index:1}
        .modal-header h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:#00ffcc;letter-spacing:.1em;text-shadow:0 0 8px rgba(0,255,204,.4)}
        .modal-close{background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer;line-height:1;transition:color .2s,filter .2s}
        .modal-close:hover{color:var(--gold);filter:drop-shadow(0 0 4px #00ff88)}
        .modal-form{padding:1.5rem;display:flex;flex-direction:column;gap:1.1rem}
        .form-group{display:flex;flex-direction:column;gap:.4rem}
        .form-group label{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase}
        .form-group input[type="text"],.form-group textarea{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.25);border-radius:2px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;padding:.6rem .85rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
        .form-group input[type="text"]:focus,.form-group textarea:focus{border-color:rgba(0,255,136,.6);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
        .form-group input[type="file"]{background:rgba(0,0,0,.5);border:1px dashed rgba(0,255,136,.25);border-radius:2px;color:var(--text-dim);font-family:'Crimson Text',serif;font-size:.9rem;padding:.55rem .85rem;width:100%;cursor:pointer;outline:none;transition:border-color .2s}
        .form-group input[type="file"]:hover{border-color:rgba(0,255,136,.5)}
        .image-preview{margin-top:.5rem}
        .image-preview img{max-width:100%;max-height:140px;object-fit:cover;border:1px solid rgba(0,255,136,.3);border-radius:2px;box-shadow:0 0 6px rgba(0,255,136,.15)}
        .btn-primary{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.15em;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.5);color:#00ffcc;padding:.75rem 1.5rem;border-radius:2px;cursor:pointer;transition:all .25s;align-self:flex-end}
        .btn-primary:hover{background:rgba(0,255,136,.22);border-color:var(--gold);box-shadow:0 0 20px rgba(0,255,136,.3)}
        .toast{position:fixed;bottom:2rem;right:2rem;z-index:300;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.08em;padding:.75rem 1.3rem;border-radius:2px;border-left:3px solid #00ff88;background:rgba(0,10,5,.97);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.error{border-color:var(--danger-hover)}
        @media(max-width:500px){.content-list{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html" class="logo-text">NAWARU</a></div>
            <div class="nav-actions">
                <button class="btn-logout" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
                <a href="admin.html" class="login-icon" id="loginIcon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
            </div>
        </div>
    </nav>
    <main class="container">
        <header class="page-header">
            <div class="page-title"><span class="page-icon">🧬</span><h1>Razas</h1></div>
            <button class="btn-add" id="addBtn" style="display:none;">+ Agregar</button>
        </header>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">Agregar Raza</h2><button type="button" class="modal-close" id="closeModal">&times;</button></div>
            <div class="modal-form">
                <div class="form-group"><label for="nombre">Nombre de la Raza</label><input type="text" id="nombre" placeholder="Ej: Elfos, Humanos..."></div>
                <div class="form-group"><label for="descripcion">Descripción</label><textarea id="descripcion" rows="4" placeholder="Describe la raza..."></textarea></div>
                <div class="form-group"><label for="imagen">Imagen</label><input type="file" id="imagen" accept="image/*"><div id="imagePreview" class="image-preview"></div></div>
                <button type="button" class="btn-primary" id="saveBtn">💾 Guardar</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL='https://TU_PROYECTO.supabase.co',SUPABASE_KEY='TU_ANON_KEY',TABLE_NAME='razas',STORAGE_BUCKET='imagenes';
        const{createClient}=supabase,sb=createClient(SUPABASE_URL,SUPABASE_KEY);
        let isAdmin=false,editingId=null;
        const logoutBtn=document.getElementById('logoutBtn'),loginIcon=document.getElementById('loginIcon'),addBtn=document.getElementById('addBtn'),loadingEl=document.getElementById('loading'),contentEl=document.getElementById('content'),modal=document.getElementById('modal'),modalTitle=document.getElementById('modalTitle'),closeModalBtn=document.getElementById('closeModal'),saveBtn=document.getElementById('saveBtn'),nombreInput=document.getElementById('nombre'),descInput=document.getElementById('descripcion'),imagenInput=document.getElementById('imagen'),imgPreview=document.getElementById('imagePreview'),toastEl=document.getElementById('toast');
        function showToast(msg,type='ok'){toastEl.textContent=msg;toastEl.className='toast show'+(type==='error'?' error':'');setTimeout(()=>{toastEl.className='toast'},3200)}
        async function checkAuth(){const{data:{session}}=await sb.auth.getSession();isAdmin=!!session;logoutBtn.style.display=isAdmin?'inline-block':'none';loginIcon.style.display=isAdmin?'none':'flex';addBtn.style.display=isAdmin?'inline-block':'none'}
        logoutBtn.addEventListener('click',async()=>{await sb.auth.signOut();isAdmin=false;logoutBtn.style.display='none';loginIcon.style.display='flex';addBtn.style.display='none';renderItems(await fetchItems());showToast('Sesión cerrada')});
        async function fetchItems(){const{data,error}=await sb.from(TABLE_NAME).select('*').order('created_at',{ascending:false});if(error){showToast('Error al cargar datos','error');return[]}return data||[]}
        function renderItems(items){loadingEl.style.display='none';contentEl.innerHTML='';if(!items.length){contentEl.innerHTML='<p class="empty-state">Aún no hay razas registradas.</p>';return}items.forEach((item,i)=>{const card=document.createElement('div');card.className='item-card';card.style.animationDelay=`${i*.07}s`;const imgHTML=item.imagen_url?`<img src="${item.imagen_url}" alt="${item.nombre}" class="item-image" loading="lazy">`:`<div class="item-image-placeholder">🧬</div>`;const actionsHTML=isAdmin?`<div class="item-actions"><button class="btn-edit" data-id="${item.id}">✏ Editar</button><button class="btn-delete" data-id="${item.id}">✕ Eliminar</button></div>`:'';card.innerHTML=`${imgHTML}<div class="item-body"><div class="item-name">${item.nombre||'—'}</div><p class="item-desc">${item.descripcion||''}</p></div>${actionsHTML}`;contentEl.appendChild(card)});document.querySelectorAll('.btn-edit').forEach(btn=>btn.addEventListener('click',()=>openEdit(btn.dataset.id,items)));document.querySelectorAll('.btn-delete').forEach(btn=>btn.addEventListener('click',()=>deleteItem(btn.dataset.id)))}
        function openModal(title){modalTitle.textContent=title;modal.classList.add('open');nombreInput.focus()}
        function closeModalFn(){modal.classList.remove('open');nombreInput.value='';descInput.value='';imagenInput.value='';imgPreview.innerHTML='';editingId=null}
        addBtn.addEventListener('click',()=>{editingId=null;openModal('Agregar Raza')});
        closeModalBtn.addEventListener('click',closeModalFn);
        modal.addEventListener('click',e=>{if(e.target===modal)closeModalFn()});
        imagenInput.addEventListener('change',()=>{const file=imagenInput.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{imgPreview.innerHTML=`<img src="${e.target.result}" alt="Vista previa">`};reader.readAsDataURL(file)});
        function openEdit(id,items){const item=items.find(r=>String(r.id)===String(id));if(!item)return;editingId=id;nombreInput.value=item.nombre||'';descInput.value=item.descripcion||'';imgPreview.innerHTML=item.imagen_url?`<img src="${item.imagen_url}" alt="imagen actual">`:'';openModal('Editar Raza')}
        saveBtn.addEventListener('click',async()=>{const nombre=nombreInput.value.trim();if(!nombre){showToast('El nombre es obligatorio','error');return}saveBtn.textContent='⏳ Guardando...';saveBtn.disabled=true;let imagen_url=null;if(imagenInput.files[0]){const file=imagenInput.files[0];const ext=file.name.split('.').pop();const path=`razas/${Date.now()}.${ext}`;const{error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:true});if(!upErr){const{data:urlData}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);imagen_url=urlData.publicUrl}}const payload={nombre,descripcion:descInput.value.trim()};if(imagen_url)payload.imagen_url=imagen_url;let error;if(editingId){({error}=await sb.from(TABLE_NAME).update(payload).eq('id',editingId))}else{({error}=await sb.from(TABLE_NAME).insert([payload]))}saveBtn.textContent='💾 Guardar';saveBtn.disabled=false;if(error){showToast('Error: '+error.message,'error')}else{showToast(editingId?'Raza actualizada':'Raza agregada');closeModalFn();renderItems(await fetchItems())}});
        async function deleteItem(id){if(!confirm('¿Eliminar esta raza?'))return;const{error}=await sb.from(TABLE_NAME).delete().eq('id',id);if(error){showToast('Error al eliminar','error')}else{showToast('Raza eliminada');renderItems(await fetchItems())}}
        (async()=>{await checkAuth();renderItems(await fetchItems())})();
    </script>
</body>
</html>
