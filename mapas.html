<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Mapas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
    --gold:        #00ff88;
    --gold-light:  #00ffcc;
    --gold-dark:   #00cc66;
    --ink:         #000000;
    --parchment:   #050f0a;
    --mist:        #0a1a10;
    --text:        #ccffe8;
    --text-dim:    #00aa55;
    --danger:      #ff2244;
    --danger-hover:#ff4466;
}

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background-color: var(--ink);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(58,122,173,0.04) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,11,7,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; height: 60px;
        }
        .logo-text {
            font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; font-weight: 700;
            color: var(--gold); letter-spacing: 0.2em; text-decoration: none;
            text-shadow: 0 0 20px rgba(201,168,76,0.4); transition: text-shadow 0.3s;
        }
        .logo-text:hover { text-shadow: 0 0 30px rgba(201,168,76,0.7); }
        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
        .login-icon { color: var(--text-dim); transition: color 0.2s; display: flex; align-items: center; }
        .login-icon:hover { color: var(--gold); }
        .btn-logout {
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.1em;
            background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--text-dim);
            padding: 0.35rem 0.8rem; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger-hover); }

        /* ── LAYOUT ── */
        .container {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem;
        }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2.5rem; padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .page-title { display: flex; align-items: center; gap: 0.8rem; }
        .page-icon { font-size: 2rem; }
        .page-title h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 700;
            color: var(--gold); letter-spacing: 0.15em;
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
        }
        .btn-add {
            font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.12em;
            background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.4);
            color: var(--gold-light); padding: 0.5rem 1.2rem; border-radius: 2px;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-add:hover { background: rgba(201,168,76,0.22); border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.2); }

        /* ── LOADING / EMPTY ── */
        .loading, .empty-state {
            text-align: center; padding: 4rem 1rem;
            font-style: italic; font-size: 1.1rem; color: var(--text-dim);
        }
        .loading::after {
            content: ''; display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: var(--gold); margin-left: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.3; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.2); }
        }

        /* ── GRID — mapas más grandes para ver detalle ── */
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .item-card {
            background: rgba(26,21,8,0.8);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 2px; overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            animation: fadeUp 0.5s ease both;
        }
        .item-card:hover {
            transform: translateY(-4px);
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 10px 32px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.07);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Imagen del mapa — más alta para mostrar detalle cartográfico */
        .map-image-wrap {
            position: relative;
            height: 260px;
            overflow: hidden;
            cursor: zoom-in;
        }
        .map-image-wrap img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            filter: brightness(0.88) sepia(0.2) saturate(0.9);
            transition: filter 0.3s, transform 0.5s;
        }
        .item-card:hover .map-image-wrap img {
            filter: brightness(0.97) sepia(0.08);
            transform: scale(1.04);
        }
        .map-zoom-hint {
            position: absolute; bottom: 0.6rem; right: 0.7rem;
            font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em;
            color: rgba(201,168,76,0.7); background: rgba(13,11,7,0.7);
            padding: 0.2rem 0.5rem; border-radius: 2px;
            opacity: 0; transition: opacity 0.2s;
        }
        .item-card:hover .map-zoom-hint { opacity: 1; }

        .item-image-placeholder {
            width: 100%; height: 260px;
            background: linear-gradient(135deg, var(--parchment), var(--mist));
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: rgba(201,168,76,0.2);
        }

        .item-body { padding: 1.2rem 1.3rem 0.8rem; }
        .item-name {
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600;
            color: var(--gold-light); letter-spacing: 0.08em; margin-bottom: 0.5rem;
        }
        .item-desc { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; }

        .item-actions {
            display: flex; gap: 0.5rem;
            padding: 0.75rem 1.3rem 1rem;
            border-top: 1px solid rgba(201,168,76,0.1);
        }
        .btn-edit, .btn-delete {
            font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.1em;
            border: none; padding: 0.35rem 0.9rem; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        .btn-edit { background: rgba(201,168,76,0.12); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }
        .btn-edit:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
        .btn-delete { background: rgba(192,57,43,0.1); color: #e07070; border: 1px solid rgba(192,57,43,0.3); }
        .btn-delete:hover { background: rgba(192,57,43,0.25); border-color: var(--danger-hover); }

        /* ── LIGHTBOX (zoom de mapa) ── */
        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(5,4,2,0.95); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; padding: 1.5rem;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 100%; max-height: 90vh;
            object-fit: contain;
            border: 1px solid rgba(201,168,76,0.3);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            animation: lbIn 0.2s ease;
        }
        @keyframes lbIn {
            from { opacity: 0; transform: scale(0.93); }
            to   { opacity: 1; transform: scale(1); }
        }
        .lightbox-close {
            position: absolute; top: 1.2rem; right: 1.5rem;
            background: none; border: none; color: var(--text-dim);
            font-size: 2rem; cursor: pointer; transition: color 0.2s; line-height: 1;
        }
        .lightbox-close:hover { color: var(--gold); }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(5,4,2,0.88); backdrop-filter: blur(6px);
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--parchment); border: 1px solid rgba(201,168,76,0.3);
            border-radius: 2px; width: 100%; max-width: 520px;
            max-height: 92vh; overflow-y: auto; animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.3rem 1.5rem; border-bottom: 1px solid rgba(201,168,76,0.2);
            position: sticky; top: 0; background: var(--parchment); z-index: 1;
        }
        .modal-header h2 {
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600;
            color: var(--gold-light); letter-spacing: 0.1em;
        }
        .modal-close {
            background: none; border: none; color: var(--text-dim);
            font-size: 1.4rem; cursor: pointer; line-height: 1; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--gold); }

        /* ── FORM ── */
        .modal-form { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label {
            font-family: 'Cinzel', serif; font-size: 0.7rem;
            letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase;
        }
        .form-group input[type="text"],
        .form-group textarea {
            background: rgba(13,11,7,0.7); border: 1px solid rgba(201,168,76,0.25);
            border-radius: 2px; color: var(--text);
            font-family: 'Crimson Text', serif; font-size: 1rem;
            padding: 0.6rem 0.85rem; width: 100%; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; resize: vertical;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: rgba(201,168,76,0.6);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
        }
        .form-group input[type="file"] {
            background: rgba(13,11,7,0.5); border: 1px dashed rgba(201,168,76,0.25);
            border-radius: 2px; color: var(--text-dim);
            font-family: 'Crimson Text', serif; font-size: 0.9rem;
            padding: 0.55rem 0.85rem; width: 100%;
            cursor: pointer; outline: none; transition: border-color 0.2s;
        }
        .form-group input[type="file"]:hover { border-color: rgba(201,168,76,0.5); }
        .image-preview { margin-top: 0.5rem; }
        .image-preview img {
            max-width: 100%; max-height: 150px; object-fit: cover;
            border: 1px solid rgba(201,168,76,0.2); border-radius: 2px;
        }
        .btn-primary {
            font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.15em;
            background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.5);
            color: var(--gold-light); padding: 0.75rem 1.5rem; border-radius: 2px;
            cursor: pointer; transition: all 0.25s; align-self: flex-end;
        }
        .btn-primary:hover { background: rgba(201,168,76,0.28); border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,0.2); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 400;
            font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.08em;
            padding: 0.75rem 1.3rem; border-radius: 2px;
            border-left: 3px solid var(--gold);
            background: rgba(26,21,8,0.97); color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--danger-hover); }

        @media (max-width: 500px) { .content-list { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo-text">NAWARU</a>
            </div>
            <div class="nav-actions">
                <button class="btn-logout" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
                <a href="admin.html" class="login-icon" id="loginIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <div class="page-title">
                <span class="page-icon">🗺️</span>
                <h1>Mapas</h1>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ Agregar</button>
        </div>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">&times;</button>
        <img id="lightboxImg" src="" alt="Mapa ampliado">
    </div>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Mapa</h2>
                <button type="button" class="modal-close" id="closeModal" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label for="nombre">Nombre del Mapa</label>
                    <input type="text" id="nombre" placeholder="Ej: Mapa del Reino del Norte">
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe el mapa..."></textarea>
                </div>
                <div class="form-group">
                    <label for="imagen">Imagen del Mapa</label>
                    <input type="file" id="imagen" accept="image/*">
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <button type="button" class="btn-primary" id="saveBtn">💾 Guardar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ══════════════════════════════════════════════
        //  CONFIGURACIÓN — reemplaza con tus credenciales
        // ══════════════════════════════════════════════
        const SUPABASE_URL   = 'https://shnwanhkuphlcevxnlvh.supabase.co';
        const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobndhbmhrdXBobGNldnhubHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTk2NTIsImV4cCI6MjA4NzM3NTY1Mn0.sUfY3j1wQS4-rjWAxY5a7m4ADGD2n2tYJSwEW0nfNNQ';
        const TABLE_NAME     = 'mapas';
        const STORAGE_BUCKET = 'imagenes';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin   = false;
        let editingId = null;

        const logoutBtn    = document.getElementById('logoutBtn');
        const loginIcon    = document.getElementById('loginIcon');
        const addBtn       = document.getElementById('addBtn');
        const loadingEl    = document.getElementById('loading');
        const contentEl    = document.getElementById('content');
        const modal        = document.getElementById('modal');
        const modalTitle   = document.getElementById('modalTitle');
        const closeModalBtn= document.getElementById('closeModal');
        const saveBtn      = document.getElementById('saveBtn');
        const nombreInput  = document.getElementById('nombre');
        const descInput    = document.getElementById('descripcion');
        const imagenInput  = document.getElementById('imagen');
        const imgPreview   = document.getElementById('imagePreview');
        const toastEl      = document.getElementById('toast');
        const lightbox     = document.getElementById('lightbox');
        const lightboxImg  = document.getElementById('lightboxImg');
        const lightboxClose= document.getElementById('lightboxClose');

        // ── Lightbox ──
        function openLightbox(src, alt) {
            lightboxImg.src = src;
            lightboxImg.alt = alt || 'Mapa';
            lightbox.classList.add('open');
        }
        lightboxClose.addEventListener('click', () => lightbox.classList.remove('open'));
        lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

        function showToast(msg, type = 'ok') {
            toastEl.textContent = msg;
            toastEl.className = 'toast show' + (type === 'error' ? ' error' : '');
            setTimeout(() => { toastEl.className = 'toast'; }, 3200);
        }

        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            isAdmin = !!session;
            logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
            loginIcon.style.display = isAdmin ? 'none'         : 'flex';
            addBtn.style.display    = isAdmin ? 'inline-block' : 'none';
        }

        logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            isAdmin = false;
            logoutBtn.style.display = 'none';
            loginIcon.style.display = 'flex';
            addBtn.style.display    = 'none';
            renderItems(await fetchItems());
            showToast('Sesión cerrada');
        });

        async function fetchItems() {
            const { data, error } = await sb
                .from(TABLE_NAME).select('*')
                .order('created_at', { ascending: false });
            if (error) { showToast('Error al cargar datos', 'error'); return []; }
            return data || [];
        }

        function renderItems(items) {
            loadingEl.style.display = 'none';
            contentEl.innerHTML = '';
            if (!items.length) {
                contentEl.innerHTML = '<p class="empty-state">Aún no hay mapas registrados.</p>';
                return;
            }
            items.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.animationDelay = `${i * 0.07}s`;

                const imgHTML = item.imagen_url
                    ? `<div class="map-image-wrap" data-src="${item.imagen_url}" data-name="${item.nombre || 'Mapa'}">
                           <img src="${item.imagen_url}" alt="${item.nombre}" loading="lazy">
                           <span class="map-zoom-hint">🔍 Ver mapa</span>
                       </div>`
                    : `<div class="item-image-placeholder">🗺️</div>`;

                const actionsHTML = isAdmin ? `
                    <div class="item-actions">
                        <button class="btn-edit"   data-id="${item.id}">✏ Editar</button>
                        <button class="btn-delete" data-id="${item.id}">✕ Eliminar</button>
                    </div>` : '';

                card.innerHTML = `
                    ${imgHTML}
                    <div class="item-body">
                        <div class="item-name">${item.nombre || '—'}</div>
                        <p class="item-desc">${item.descripcion || ''}</p>
                    </div>
                    ${actionsHTML}
                `;
                contentEl.appendChild(card);
            });

            // Lightbox al hacer clic en imagen
            document.querySelectorAll('.map-image-wrap').forEach(wrap => {
                wrap.addEventListener('click', () => openLightbox(wrap.dataset.src, wrap.dataset.name));
            });

            document.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => openEdit(btn.dataset.id, items))
            );
            document.querySelectorAll('.btn-delete').forEach(btn =>
                btn.addEventListener('click', () => deleteItem(btn.dataset.id))
            );
        }

        function openModal(title) {
            modalTitle.textContent = title;
            modal.classList.add('open');
            nombreInput.focus();
        }

        function closeModalFn() {
            modal.classList.remove('open');
            nombreInput.value = '';
            descInput.value   = '';
            imagenInput.value = '';
            imgPreview.innerHTML = '';
            editingId = null;
        }

        addBtn.addEventListener('click', () => { editingId = null; openModal('Agregar Mapa'); });
        closeModalBtn.addEventListener('click', closeModalFn);
        modal.addEventListener('click', e => { if (e.target === modal) closeModalFn(); });

        imagenInput.addEventListener('change', () => {
            const file = imagenInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                imgPreview.innerHTML = `<img src="${e.target.result}" alt="Vista previa">`;
            };
            reader.readAsDataURL(file);
        });

        function openEdit(id, items) {
            const item = items.find(r => String(r.id) === String(id));
            if (!item) return;
            editingId = id;
            nombreInput.value = item.nombre      || '';
            descInput.value   = item.descripcion || '';
            imgPreview.innerHTML = item.imagen_url
                ? `<img src="${item.imagen_url}" alt="imagen actual">` : '';
            openModal('Editar Mapa');
        }

        saveBtn.addEventListener('click', async () => {
            const nombre = nombreInput.value.trim();
            if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

            saveBtn.textContent = '⏳ Guardando...';
            saveBtn.disabled    = true;

            let imagen_url = null;
            if (imagenInput.files[0]) {
                const file = imagenInput.files[0];
                const ext  = file.name.split('.').pop();
                const path = `mapas/${Date.now()}.${ext}`;
                const { error: upErr } = await sb.storage
                    .from(STORAGE_BUCKET).upload(path, file, { upsert: true });
                if (!upErr) {
                    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
                    imagen_url = urlData.publicUrl;
                }
            }

            const payload = { nombre, descripcion: descInput.value.trim() };
            if (imagen_url) payload.imagen_url = imagen_url;

            let error;
            if (editingId) {
                ({ error } = await sb.from(TABLE_NAME).update(payload).eq('id', editingId));
            } else {
                ({ error } = await sb.from(TABLE_NAME).insert([payload]));
            }

            saveBtn.textContent = '💾 Guardar';
            saveBtn.disabled    = false;

            if (error) {
                showToast('Error al guardar: ' + error.message, 'error');
            } else {
                showToast(editingId ? 'Mapa actualizado' : 'Mapa agregado');
                closeModalFn();
                renderItems(await fetchItems());
            }
        });

        async function deleteItem(id) {
            if (!confirm('¿Eliminar este mapa?')) return;
            const { error } = await sb.from(TABLE_NAME).delete().eq('id', id);
            if (error) { showToast('Error al eliminar', 'error'); }
            else        { showToast('Mapa eliminado'); renderItems(await fetchItems()); }
        }

        (async () => {
            await checkAuth();
            renderItems(await fetchItems());
        })();
    </script>
</body>
</html>
