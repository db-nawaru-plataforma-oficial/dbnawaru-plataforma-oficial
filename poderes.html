<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaru - Poderes Elementales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

     :root {
    --gold:        #00ff88;
    --gold-light:  #00ffcc;
    --gold-dark:   #00cc66;
    --ink:         #000000;
    --parchment:   #050f0a;
    --mist:        #0a1a10;
    --text:        #ccffe8;
    --text-dim:    #00aa55;
    --danger:      #ff2244;
    --danger-hover:#ff4466;
}

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background-color: var(--ink);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 20% 20%, rgba(232,92,32,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(58,122,173,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,11,7,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; height: 60px;
        }
        .logo-text {
            font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; font-weight: 700;
            color: var(--gold); letter-spacing: 0.2em; text-decoration: none;
            text-shadow: 0 0 20px rgba(201,168,76,0.4); transition: text-shadow 0.3s;
        }
        .logo-text:hover { text-shadow: 0 0 30px rgba(201,168,76,0.7); }
        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
        .login-icon { color: var(--text-dim); transition: color 0.2s; display: flex; align-items: center; }
        .login-icon:hover { color: var(--gold); }
        .btn-logout {
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.1em;
            background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--text-dim);
            padding: 0.35rem 0.8rem; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger-hover); }

        /* ── LAYOUT ── */
        .container {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem;
        }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2.5rem; padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .page-title { display: flex; align-items: center; gap: 0.8rem; }
        .page-icon { font-size: 2rem; }
        .page-title h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.3rem, 4vw, 2rem); font-weight: 700;
            color: var(--gold); letter-spacing: 0.12em;
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
        }
        .btn-add {
            font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.12em;
            background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.4);
            color: var(--gold-light); padding: 0.5rem 1.2rem; border-radius: 2px;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-add:hover { background: rgba(201,168,76,0.22); border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.2); }

        /* ── LOADING / EMPTY ── */
        .loading, .empty-state {
            text-align: center; padding: 4rem 1rem;
            font-style: italic; font-size: 1.1rem; color: var(--text-dim);
        }
        .loading::after {
            content: ''; display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: var(--gold); margin-left: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.3; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.2); }
        }

        /* ── CARDS GRID ── */
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .item-card {
            background: rgba(26,21,8,0.8);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 2px; overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            animation: fadeUp 0.5s ease both;
            position: relative;
        }
        /* Acento de color elemental en el borde superior */
        .item-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: var(--element-color, var(--gold));
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .item-card:hover { transform: translateY(-4px); border-color: rgba(201,168,76,0.4); }
        .item-card:hover::before { opacity: 1; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Galería */
        .card-gallery { position: relative; height: 200px; overflow: hidden; }
        .card-gallery img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            filter: brightness(0.8) sepia(0.2); transition: filter 0.3s, transform 0.4s;
        }
        .item-card:hover .card-gallery img { filter: brightness(0.95) sepia(0.05); transform: scale(1.04); }
        .item-image-placeholder {
            width: 100%; height: 200px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, var(--parchment), var(--mist));
        }
        /* Glow elemental en el placeholder */
        .item-image-placeholder span {
            filter: drop-shadow(0 0 16px var(--element-color, var(--gold)));
            animation: elementPulse 3s ease-in-out infinite alternate;
        }
        @keyframes elementPulse {
            from { transform: scale(1);    filter: drop-shadow(0 0 12px var(--element-color, var(--gold))); }
            to   { transform: scale(1.08); filter: drop-shadow(0 0 24px var(--element-color, var(--gold))); }
        }

        .gallery-thumbs {
            display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.3);
        }
        .gallery-thumbs img {
            width: 44px; height: 36px; object-fit: cover; cursor: pointer;
            opacity: 0.6; border: 1px solid transparent; border-radius: 1px;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .gallery-thumbs img.active,
        .gallery-thumbs img:hover { opacity: 1; border-color: var(--gold); }

        .item-body { padding: 1.3rem 1.3rem 0.8rem; }
        .item-name {
            font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 600;
            color: var(--gold-light); letter-spacing: 0.08em; margin-bottom: 0.6rem;
        }
        .item-desc { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; }

        .item-actions {
            display: flex; gap: 0.5rem;
            padding: 0.75rem 1.3rem 1rem;
            border-top: 1px solid rgba(201,168,76,0.1);
        }
        .btn-edit, .btn-delete {
            font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.1em;
            border: none; padding: 0.35rem 0.9rem; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        .btn-edit { background: rgba(201,168,76,0.12); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }
        .btn-edit:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
        .btn-delete { background: rgba(192,57,43,0.1); color: #e07070; border: 1px solid rgba(192,57,43,0.3); }
        .btn-delete:hover { background: rgba(192,57,43,0.25); border-color: var(--danger-hover); }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(5,4,2,0.88); backdrop-filter: blur(6px);
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--parchment); border: 1px solid rgba(201,168,76,0.3);
            border-radius: 2px; width: 100%; max-width: 520px;
            max-height: 92vh; overflow-y: auto; animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.3rem 1.5rem; border-bottom: 1px solid rgba(201,168,76,0.2);
            position: sticky; top: 0; background: var(--parchment); z-index: 1;
        }
        .modal-header h2 {
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600;
            color: var(--gold-light); letter-spacing: 0.1em;
        }
        .modal-close {
            background: none; border: none; color: var(--text-dim);
            font-size: 1.4rem; cursor: pointer; line-height: 1; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--gold); }

        /* ── FORM ── */
        .modal-form { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label {
            font-family: 'Cinzel', serif; font-size: 0.7rem;
            letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase;
        }
        .form-group input[type="text"],
        .form-group textarea {
            background: rgba(13,11,7,0.7); border: 1px solid rgba(201,168,76,0.25);
            border-radius: 2px; color: var(--text);
            font-family: 'Crimson Text', serif; font-size: 1rem;
            padding: 0.6rem 0.85rem; width: 100%; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; resize: vertical;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: rgba(201,168,76,0.6);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
        }
        .form-group input[type="file"] {
            background: rgba(13,11,7,0.5); border: 1px dashed rgba(201,168,76,0.25);
            border-radius: 2px; color: var(--text-dim);
            font-family: 'Crimson Text', serif; font-size: 0.9rem;
            padding: 0.55rem 0.85rem; width: 100%;
            cursor: pointer; outline: none; transition: border-color 0.2s;
        }
        .form-group input[type="file"]:hover { border-color: rgba(201,168,76,0.5); }
        .image-preview { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .image-preview img {
            height: 70px; width: 90px; object-fit: cover;
            border: 1px solid rgba(201,168,76,0.25); border-radius: 2px;
        }
        .btn-primary {
            font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.15em;
            background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.5);
            color: var(--gold-light); padding: 0.75rem 1.5rem; border-radius: 2px;
            cursor: pointer; transition: all 0.25s; align-self: flex-end;
        }
        .btn-primary:hover { background: rgba(201,168,76,0.28); border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,0.2); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
            font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.08em;
            padding: 0.75rem 1.3rem; border-radius: 2px;
            border-left: 3px solid var(--gold);
            background: rgba(26,21,8,0.97); color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--danger-hover); }

        @media (max-width: 500px) { .content-list { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo-text">NAWARU</a>
            </div>
            <div class="nav-actions">
                <button class="btn-logout" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
                <a href="admin.html" class="login-icon" id="loginIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <div class="page-title">
                <span class="page-icon">🔥</span>
                <h1>Poderes Elementales</h1>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;">+ Agregar</button>
        </header>
        <div id="loading" class="loading">Cargando</div>
        <div id="content" class="content-list"></div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Poder Elemental</h2>
                <button type="button" class="modal-close" id="closeModal" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label for="nombre">Nombre del Elemento</label>
                    <input type="text" id="nombre" placeholder="Ej: Fuego, Agua, Tierra...">
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe el poder elemental..."></textarea>
                </div>
                <div class="form-group">
                    <label for="imagenes">Imágenes (puedes seleccionar varias)</label>
                    <input type="file" id="imagenes" accept="image/*" multiple>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <button type="button" class="btn-primary" id="saveBtn">💾 Guardar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ══════════════════════════════════════════════
        //  CONFIGURACIÓN — reemplaza con tus credenciales
        // ══════════════════════════════════════════════
        const SUPABASE_URL   = 'https://shnwanhkuphlcevxnlvh.supabase.co';
        const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobndhbmhrdXBobGNldnhubHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTk2NTIsImV4cCI6MjA4NzM3NTY1Mn0.sUfY3j1wQS4-rjWAxY5a7m4ADGD2n2tYJSwEW0nfNNQ';
        const TABLE_NAME     = 'poderes';
        const STORAGE_BUCKET = 'imagenes';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin   = false;
        let editingId = null;
        let newFiles  = [];

        // Mapa de colores elementales por nombre clave
        const ELEMENT_COLORS = {
            fuego: '#e85c20', fire: '#e85c20',
            agua:  '#3a7aad', water: '#3a7aad',
            tierra:'#7a6a3a', earth: '#7a6a3a',
            aire:  '#8aadca', air:   '#8aadca',
            viento:'#8aadca', wind:  '#8aadca',
            rayo:  '#e8cc20', thunder: '#e8cc20', lightning: '#e8cc20',
            hielo: '#aadde8', ice:   '#aadde8',
            espiritu: '#9a6aad', spirit: '#9a6aad',
            oscuridad:'#6a3a8a', dark:  '#6a3a8a', shadow: '#6a3a8a',
            luz:   '#e8e0aa', light: '#e8e0aa',
            naturaleza: '#4a8a4a', nature: '#4a8a4a',
        };

        function getElementColor(nombre) {
            if (!nombre) return null;
            const key = nombre.toLowerCase().trim();
            for (const [word, color] of Object.entries(ELEMENT_COLORS)) {
                if (key.includes(word)) return color;
            }
            return null;
        }

        // Emoji por elemento
        const ELEMENT_ICONS = {
            fuego:'🔥', fire:'🔥',
            agua:'💧', water:'💧',
            tierra:'🪨', earth:'🪨',
            aire:'🌬️', air:'🌬️', viento:'🌬️', wind:'🌬️',
            rayo:'⚡', thunder:'⚡', lightning:'⚡',
            hielo:'❄️', ice:'❄️',
            espiritu:'✨', spirit:'✨',
            oscuridad:'🌑', dark:'🌑', shadow:'🌑',
            luz:'☀️', light:'☀️',
            naturaleza:'🌿', nature:'🌿',
        };

        function getElementIcon(nombre) {
            if (!nombre) return '🔮';
            const key = nombre.toLowerCase().trim();
            for (const [word, icon] of Object.entries(ELEMENT_ICONS)) {
                if (key.includes(word)) return icon;
            }
            return '🔮';
        }

        const logoutBtn    = document.getElementById('logoutBtn');
        const loginIcon    = document.getElementById('loginIcon');
        const addBtn       = document.getElementById('addBtn');
        const loadingEl    = document.getElementById('loading');
        const contentEl    = document.getElementById('content');
        const modal        = document.getElementById('modal');
        const modalTitle   = document.getElementById('modalTitle');
        const closeModalBtn= document.getElementById('closeModal');
        const saveBtn      = document.getElementById('saveBtn');
        const nombreInput  = document.getElementById('nombre');
        const descInput    = document.getElementById('descripcion');
        const imagenesInput= document.getElementById('imagenes');
        const imgPreview   = document.getElementById('imagePreview');
        const toastEl      = document.getElementById('toast');

        function showToast(msg, type = 'ok') {
            toastEl.textContent = msg;
            toastEl.className = 'toast show' + (type === 'error' ? ' error' : '');
            setTimeout(() => { toastEl.className = 'toast'; }, 3200);
        }

        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            isAdmin = !!session;
            logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
            loginIcon.style.display = isAdmin ? 'none'         : 'flex';
            addBtn.style.display    = isAdmin ? 'inline-block' : 'none';
        }

        logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            isAdmin = false;
            logoutBtn.style.display = 'none';
            loginIcon.style.display = 'flex';
            addBtn.style.display    = 'none';
            renderItems(await fetchItems());
            showToast('Sesión cerrada');
        });

        async function fetchItems() {
            const { data, error } = await sb
                .from(TABLE_NAME).select('*')
                .order('created_at', { ascending: false });
            if (error) { showToast('Error al cargar datos', 'error'); return []; }
            return data || [];
        }

        function renderItems(items) {
            loadingEl.style.display = 'none';
            contentEl.innerHTML = '';
            if (!items.length) {
                contentEl.innerHTML = '<p class="empty-state">Aún no hay poderes elementales registrados.</p>';
                return;
            }
            items.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.animationDelay = `${i * 0.07}s`;

                // Color e icono elemental
                const color = getElementColor(item.nombre);
                const icon  = getElementIcon(item.nombre);
                if (color) card.style.setProperty('--element-color', color);

                // Imágenes
                let urls = [];
                if (item.imagen_urls) {
                    try { urls = JSON.parse(item.imagen_urls); } catch { urls = [item.imagen_urls]; }
                } else if (item.imagen_url) { urls = [item.imagen_url]; }

                let galleryHTML = '';
                if (urls.length) {
                    const thumbs = urls.map((u, idx) =>
                        `<img src="${u}" class="${idx === 0 ? 'active' : ''}" data-idx="${idx}" alt="img ${idx+1}">`
                    ).join('');
                    galleryHTML = `
                        <div class="card-gallery">
                            <img id="main-img-${item.id}" src="${urls[0]}" alt="${item.nombre}">
                        </div>
                        ${urls.length > 1 ? `<div class="gallery-thumbs" data-id="${item.id}">${thumbs}</div>` : ''}
                    `;
                } else {
                    galleryHTML = `<div class="item-image-placeholder"><span>${icon}</span></div>`;
                }

                const actionsHTML = isAdmin ? `
                    <div class="item-actions">
                        <button class="btn-edit"   data-id="${item.id}">✏ Editar</button>
                        <button class="btn-delete" data-id="${item.id}">✕ Eliminar</button>
                    </div>` : '';

                card.innerHTML = `
                    ${galleryHTML}
                    <div class="item-body">
                        <div class="item-name">${item.nombre || '—'}</div>
                        <p class="item-desc">${item.descripcion || ''}</p>
                    </div>
                    ${actionsHTML}
                `;
                contentEl.appendChild(card);
            });

            // Galería: cambio de imagen principal
            document.querySelectorAll('.gallery-thumbs').forEach(thumbsEl => {
                thumbsEl.addEventListener('click', e => {
                    const thumb = e.target.closest('img');
                    if (!thumb) return;
                    const mainImg = document.getElementById(`main-img-${thumbsEl.dataset.id}`);
                    mainImg.src = thumb.src;
                    thumbsEl.querySelectorAll('img').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                });
            });

            document.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => openEdit(btn.dataset.id, items))
            );
            document.querySelectorAll('.btn-delete').forEach(btn =>
                btn.addEventListener('click', () => deleteItem(btn.dataset.id))
            );
        }

        function openModal(title) {
            modalTitle.textContent = title;
            modal.classList.add('open');
            nombreInput.focus();
        }

        function closeModalFn() {
            modal.classList.remove('open');
            nombreInput.value = '';
            descInput.value   = '';
            imagenesInput.value = '';
            imgPreview.innerHTML = '';
            editingId = null;
            newFiles  = [];
        }

        addBtn.addEventListener('click', () => { editingId = null; openModal('Agregar Poder Elemental'); });
        closeModalBtn.addEventListener('click', closeModalFn);
        modal.addEventListener('click', e => { if (e.target === modal) closeModalFn(); });

        imagenesInput.addEventListener('change', () => {
            newFiles = Array.from(imagenesInput.files);
            imgPreview.innerHTML = '';
            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    imgPreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        function openEdit(id, items) {
            const item = items.find(r => String(r.id) === String(id));
            if (!item) return;
            editingId = id;
            nombreInput.value = item.nombre      || '';
            descInput.value   = item.descripcion || '';
            imgPreview.innerHTML = '';
            let urls = [];
            if (item.imagen_urls) {
                try { urls = JSON.parse(item.imagen_urls); } catch { urls = [item.imagen_urls]; }
            } else if (item.imagen_url) { urls = [item.imagen_url]; }
            urls.forEach(u => {
                const img = document.createElement('img');
                img.src = u; imgPreview.appendChild(img);
            });
            openModal('Editar Poder Elemental');
        }

        saveBtn.addEventListener('click', async () => {
            const nombre = nombreInput.value.trim();
            if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

            saveBtn.textContent = '⏳ Guardando...';
            saveBtn.disabled    = true;

            const uploadedUrls = [];
            for (const file of newFiles) {
                const ext  = file.name.split('.').pop();
                const path = `poderes/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
                const { error: upErr } = await sb.storage
                    .from(STORAGE_BUCKET).upload(path, file, { upsert: true });
                if (!upErr) {
                    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
                    uploadedUrls.push(urlData.publicUrl);
                }
            }

            const payload = { nombre, descripcion: descInput.value.trim() };
            if (uploadedUrls.length) payload.imagen_urls = JSON.stringify(uploadedUrls);

            let error;
            if (editingId) {
                ({ error } = await sb.from(TABLE_NAME).update(payload).eq('id', editingId));
            } else {
                ({ error } = await sb.from(TABLE_NAME).insert([payload]));
            }

            saveBtn.textContent = '💾 Guardar';
            saveBtn.disabled    = false;

            if (error) {
                showToast('Error al guardar: ' + error.message, 'error');
            } else {
                showToast(editingId ? 'Poder actualizado' : 'Poder agregado');
                closeModalFn();
                renderItems(await fetchItems());
            }
        });

        async function deleteItem(id) {
            if (!confirm('¿Eliminar este poder elemental?')) return;
            const { error } = await sb.from(TABLE_NAME).delete().eq('id', id);
            if (error) { showToast('Error al eliminar', 'error'); }
            else        { showToast('Poder eliminado'); renderItems(await fetchItems()); }
        }

        (async () => {
            await checkAuth();
            renderItems(await fetchItems());
        })();
    </script>
</body>
</html>
